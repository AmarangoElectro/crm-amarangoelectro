<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Tienda AmarangoElectro 🐝</title>
<meta name="theme-color" content="#0B2D6B">
<!-- PWA: se instala como app, con el logo de cada tienda -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" id="appleIcon" href="">
<link rel="icon" id="favIcon" href="">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   TIENDA NUEVA — Bloque 1 (catálogo prolijo, diseño sobrio)
   Header con degradé Amarango (como pidió Max).
   Cuotas 15/55/78 · categorías reales · compartir con foto.
   ============================================================ */
:root{
  --az:#0B2D6B; --az2:#1e5bc8; --nar:#FF7A00;
  --bg:#F7F8FA; --wh:#fff; --txt:#141824; --sub:#7A8291; --line:#ECEEF2; --gr:#10B981;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);padding-bottom:78px}

/* BARRA INFERIOR fija (estilo Mercado Libre) */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:350;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.tabbar button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:inherit;color:var(--sub);font-size:.6rem;font-weight:700;padding:4px 0}
.tabbar button .i{font-size:1.3rem;line-height:1}
.tabbar button.on{color:var(--nar)}

/* filas del menú Más */
.mas-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.mas-row span.ic{font-size:1.3rem;width:26px;text-align:center}
.mas-row span.tx{flex:1;font-size:.88rem;font-weight:600;color:var(--txt)}
.mas-row span.ar{color:var(--sub)}
.mas-sec{font-size:.68rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 4px}

/* SISTEMA DE VISTAS (una puerta a la vez) */
.vista{display:none}
.vista.on{display:block}

/* BARRA INFERIOR — las puertas grandes tipo app */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 14px rgba(0,0,0,.06)}
.tabbar button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit;color:var(--sub);font-size:.62rem;font-weight:700;padding:4px 0}
.tabbar button .i{font-size:1.35rem;line-height:1}
.tabbar button.on{color:var(--nar)}
.tabbar button.admin-tab{color:#c0c6d0}

/* pantalla "en construcción" para las puertas que faltan */
.construccion{text-align:center;padding:70px 24px;color:var(--sub)}
.construccion .ci{font-size:3.2rem;margin-bottom:14px}
.construccion .ct{font-size:1.05rem;font-weight:900;color:var(--az);margin-bottom:6px}
.construccion .cs{font-size:.82rem;line-height:1.5}

/* HEADER con degradé (identidad Amarango, se mantiene) */
.top{position:sticky;top:0;z-index:100;background:linear-gradient(160deg,#020c2e 0%,var(--az) 55%,var(--az2) 100%);padding:13px 16px 15px;box-shadow:0 2px 12px rgba(11,45,107,.2)}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.brand .bee{font-size:1.35rem}
.brand h1{color:#fff;font-size:1.05rem;font-weight:900;letter-spacing:.2px}
.brand .tag{color:#ffb968;font-size:.6rem;font-weight:600;margin-left:auto;font-style:italic}
.searchbar{display:flex;align-items:center;gap:9px;background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.searchbar span{font-size:1rem;opacity:.5}
.searchbar input{flex:1;border:none;outline:none;font-size:.9rem;font-family:inherit;background:transparent;color:var(--txt)}

/* CATEGORÍAS */
.cats{display:flex;gap:10px;overflow-x:auto;padding:14px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:62px}
.cat .ico{width:54px;height:54px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.55rem;border:1.5px solid var(--line);transition:all .18s}
.cat.on .ico{border-color:var(--az);box-shadow:0 0 0 3px rgba(11,45,107,.08)}
.cat span{font-size:.63rem;font-weight:700;color:var(--sub);text-align:center}
.cat.on span{color:var(--az)}

.section-h{padding:4px 16px 10px;font-size:.72rem;font-weight:900;color:var(--az);letter-spacing:.5px;text-transform:uppercase}

/* BARRA DE FILTROS */
.filtros{display:flex;gap:8px;padding:2px 14px 10px;align-items:center}
.filtros select,.filtros input{border:1.5px solid var(--line);border-radius:10px;padding:10px 11px;font-family:inherit;font-size:.76rem;color:var(--txt);outline:none;background:#fff}
.filtros select{flex:1.3;font-weight:600}
.filtros input{flex:1;min-width:0}
.filtros input:focus,.filtros select:focus{border-color:var(--nar)}
.f-oferta{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;font-size:.74rem;font-weight:800;color:var(--sub);cursor:pointer;font-family:inherit;white-space:nowrap}
.f-oferta.on{background:#FFF0E0;border-color:var(--nar);color:var(--nar)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px}

/* SALUDO por hora */
.saludo{margin:8px 14px 2px;display:flex;align-items:center;gap:10px}
.saludo .emo{font-size:1.6rem}
.saludo .txt .hola{font-size:1.02rem;font-weight:900;color:var(--az);line-height:1.1}
.saludo .txt .sub{font-size:.68rem;color:var(--sub);font-weight:600;margin-top:1px}

/* PRODUCTO DEL DÍA — tarjeta grande destacada */
.pdd{margin:6px 14px 4px;background:linear-gradient(160deg,#0a1a3a,var(--az));border-radius:18px;padding:16px;display:flex;gap:14px;align-items:center;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 4px 16px rgba(11,45,107,.22)}
.pdd .tag{position:absolute;top:0;right:0;background:var(--nar);color:#fff;font-size:.56rem;font-weight:900;padding:5px 12px;border-radius:0 0 0 12px;letter-spacing:.5px}
.pdd .foto{width:96px;height:96px;flex:0 0 auto;border-radius:12px;background:#fff center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:2.4rem}
.pdd .info{flex:1;min-width:0}
.pdd .info .n{color:#fff;font-size:.92rem;font-weight:800;line-height:1.2;margin-bottom:6px}
.pdd .info .cv{color:#ffb968;font-size:1.5rem;font-weight:900;line-height:1}
.pdd .info .cn{color:var(--gr);font-size:.66rem;font-weight:700;margin-top:1px}
.pdd .info .ct{color:rgba(255,255,255,.55);font-size:.62rem;margin-top:3px}

/* DESTACADOS — fila horizontal */
.dest-row{display:flex;gap:11px;overflow-x:auto;padding:2px 14px 6px;scrollbar-width:none}
.dest-row::-webkit-scrollbar{display:none}
.dest-card{flex:0 0 auto;width:140px;background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;cursor:pointer}
.dest-card .dfoto{height:96px;background:#FAFBFC center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:2rem;border-bottom:1px solid var(--line);position:relative}
.dest-card .dstar{position:absolute;top:5px;left:5px;background:var(--nar);color:#fff;font-size:.5rem;font-weight:900;padding:2px 6px;border-radius:5px}
.dest-card .dbody{padding:8px 10px 10px}
.dest-card .dn{font-size:.68rem;font-weight:700;color:var(--txt);line-height:1.25;height:34px;overflow:hidden;margin-bottom:4px}
.dest-card .dcv{font-size:.9rem;font-weight:900;color:var(--nar)}
.dest-card .dcn{font-size:.55rem;color:var(--gr);font-weight:700}

/* TARJETA (sobria) */
.card{background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--line);transition:transform .15s}
.card:active{transform:scale(.985)}
.card .ph{height:120px;background:#FAFBFC;display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative;border-bottom:1px solid var(--line);cursor:pointer;background-size:cover;background-position:center}
.card .fav{position:absolute;top:6px;right:6px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);border:none;font-size:.9rem;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.15);line-height:1}
.card .badge{position:absolute;top:6px;left:6px;background:var(--nar);color:#fff;font-size:.52rem;font-weight:800;padding:3px 7px;border-radius:6px;letter-spacing:.2px}
.card .body{padding:10px 12px 12px;display:flex;flex-direction:column;flex:1}
.card .marca{font-size:.55rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.card .nom{font-size:.79rem;font-weight:700;color:var(--txt);line-height:1.3;margin:3px 0 7px;min-height:34px;cursor:pointer}
.card .cuota-v{font-size:1.15rem;font-weight:900;color:var(--nar);line-height:1.05}
.card .cuota-n{font-size:.6rem;font-weight:700;color:var(--gr);margin-bottom:2px}
.card .contado{font-size:.64rem;color:var(--sub);margin-bottom:8px}
.card .share{margin-top:auto;width:100%;background:#25D366;color:#fff;border:none;border-radius:9px;padding:9px;font-size:.72rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}

.estado{text-align:center;padding:44px 20px;color:var(--sub)}
.estado .e-i{font-size:2.6rem;margin-bottom:10px}
.setup{margin:14px;background:#FFF9F0;border:1.5px dashed var(--nar);border-radius:14px;padding:16px;font-size:.78rem;color:var(--az);line-height:1.55}
.setup b{color:var(--nar)}
.setup code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:.72rem}

/* DETALLE */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(2,8,20,.55);backdrop-filter:blur(3px);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:520px;border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;animation:up .28s cubic-bezier(.2,.9,.3,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{background:linear-gradient(160deg,#020c2e,var(--az));padding:18px;position:sticky;top:0;z-index:2}
/* botón cerrar BIEN VISIBLE (antes nadie sabía dónde tocar) */
.sheet-head .x{position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:50%;background:#fff;border:none;color:var(--az);font-size:1.25rem;font-weight:900;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:6;line-height:1;display:flex;align-items:center;justify-content:center}
.sheet-head .ph-big{width:100%;height:180px;border-radius:14px;background:#0a1a3a center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:3.5rem;margin-bottom:10px}
.sheet-head .nom{color:#fff;font-size:1.15rem;font-weight:900;text-align:center}

/* FOTO GRANDE del producto (estilo Mercado Libre) — entera, sin recortar, en alta */
.foto-big{width:100%;height:290px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.foto-big img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.foto-big .sinfoto{font-size:4rem;opacity:.25}

/* Productos sugeridos */
.sug-row{display:flex;gap:10px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}
.sug-row::-webkit-scrollbar{display:none}
.sug-card{flex:0 0 auto;width:132px;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer}
.sug-card .sf{height:92px;background:#FAFBFC;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);overflow:hidden}
.sug-card .sf img{max-width:100%;max-height:100%;object-fit:contain}
.sug-card .sb{padding:8px 9px 10px}
.sug-card .sn{font-size:.66rem;font-weight:700;color:var(--txt);line-height:1.25;height:32px;overflow:hidden;margin-bottom:3px}
.sug-card .sp{font-size:.82rem;font-weight:900;color:var(--nar)}
.sug-card .sc{font-size:.56rem;color:var(--gr);font-weight:700}
.sheet-body{padding:16px 16px 22px}
.precio-box{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid var(--line);margin-bottom:8px}
.precio-box .lbl{font-size:.62rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px}
.precio-box .val{font-size:1.7rem;font-weight:900;color:var(--az);margin-top:2px}
.cuota-title{font-size:.66rem;font-weight:900;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:14px 2px 8px}
.cuota-card{border-radius:13px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cuota-card.c2{background:#FEF9C3;border-left:4px solid #EAB308}
.cuota-card.c4{background:#FFF0E0;border-left:4px solid var(--nar)}
.cuota-card.c6{background:#EDE9FE;border-left:4px solid #7C3AED}
.cuota-card .c-n{font-size:.88rem;font-weight:900;color:var(--az)}
.cuota-card .c-v{font-size:1.12rem;font-weight:900;color:var(--az)}
.retira{background:#EEF2FF;border-radius:11px;padding:11px 13px;font-size:.68rem;color:var(--az);font-weight:700;margin-top:6px;display:flex;gap:7px;align-items:flex-start}
.wa-btn{width:100%;margin-top:14px;background:#25D366;color:#fff;border:none;border-radius:13px;padding:14px;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>

<!-- Panel de AYUDA -->
<div class="overlay" id="ayudaOverlay" onclick="if(event.target===this)cerrarAyuda()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarAyuda()">✕</button>
      <div class="nom">❓ Ayuda</div>
    </div>
    <div class="sheet-body" id="ayudaBody"></div>
  </div>
</div>

<div class="top">
  <div class="brand">
    <span class="bee" id="beeLogo" onclick="toqueAbeja()" style="cursor:pointer">🐝</span>
    <h1>AmarangoElectro</h1>
    <button id="favBtn" onclick="verFavoritos()" style="margin-left:auto;background:rgba(255,255,255,.15);border:none;border-radius:20px;padding:6px 12px;color:#fff;font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px">❤️ <span id="favCount">0</span></button>
  </div>
  <div class="searchbar">
    <span>🔍</span>
    <input id="buscador" placeholder="Buscar celular, TV, heladera..." oninput="render()">
  </div>
</div>

<div class="vista on" id="vista-tienda">
<div class="cats" id="cats"></div>
<div class="filtros" id="filtros" style="display:none">
  <select id="orden" onchange="render()">
    <option value="">Ordenar por…</option>
    <option value="barato">💵 Cuota más baja primero</option>
    <option value="caro">💰 Cuota más alta primero</option>
    <option value="oferta">🔥 Ofertas primero</option>
  </select>
  <input id="tope" type="number" inputmode="numeric" placeholder="Cuota hasta $" oninput="render()">
  <button id="btnOfertas" class="f-oferta" onclick="toggleSoloOfertas()">🔥 Ofertas</button>
</div>
<div id="saludo-wrap"></div>
<div id="destacados-wrap"></div>
<div class="section-h" id="section-h">Cargando…</div>
<div id="grid-wrap"></div>
</div><!-- fin vista-tienda -->

<!-- PANEL DEL DUEÑO (oculto — se entra tocando 5 veces la abeja + clave) -->
<div class="overlay" id="adminOverlay" onclick="if(event.target===this)cerrarAdmin()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarAdmin()">✕</button>
      <div class="nom">🔒 Panel del dueño</div>
    </div>
    <div class="sheet-body" id="adminBody"></div>
  </div>
</div>

<!-- DETALLE -->
<div class="overlay" id="overlay" onclick="if(event.target===this)cerrar()">
  <div class="sheet">
    <div style="position:sticky;top:0;z-index:3;background:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)">
      <button onclick="cerrar()" style="width:38px;height:38px;border-radius:50%;background:#F0F2F5;border:none;color:var(--az);font-size:1.2rem;cursor:pointer;font-weight:900;display:flex;align-items:center;justify-content:center;flex:0 0 auto">←</button>
      <span style="flex:1;font-size:.78rem;font-weight:700;color:var(--sub)">Volver a la tienda</span>
      <button onclick="cerrar()" style="width:38px;height:38px;border-radius:50%;background:#FEF2F2;border:1.5px solid #FECACA;color:#DC2626;font-size:1.05rem;cursor:pointer;font-weight:900;flex:0 0 auto">✕</button>
    </div>
    <div style="background:#fff;padding:0 0 6px">
      <div id="d-ph"></div>
    </div>
    <div class="sheet-body">
      <div id="d-nom" style="font-size:1.15rem;font-weight:900;color:var(--az);line-height:1.25;margin-bottom:8px"></div>
      <div class="precio-box"><div class="lbl">💰 Precio contado</div><div class="val" id="d-precio"></div></div>
      <div class="cuota-title">📅 Planes de cuotas</div>
      <div id="d-cuotas"></div>
      <div class="retira"><span>⭐</span><span>Retirás pagando solo la 1ra cuota ese mismo día.</span></div>
      <div id="d-acciones" style="margin-top:14px"></div>
      <div id="d-sugeridos" style="margin-top:20px"></div>
      <div id="d-sugeridos" style="margin-top:22px"></div>
    </div>
  </div>
</div>

<!-- Panel MÁS (menú, estilo Mercado Libre) -->
<div class="overlay" id="masOverlay" onclick="if(event.target===this)cerrarMas()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarMas()">✕</button>
      <div class="nom">☰ Más</div>
    </div>
    <div class="sheet-body" id="masBody"></div>
  </div>
</div>

<!-- BOTÓN FLOTANTE 🐝 — atajo a cargar productos. SOLO lo ve el admin. -->
<button id="beeFab" onclick="abrirCargarDirecto()" style="display:none;position:fixed;bottom:88px;right:16px;z-index:340;width:60px;height:60px;border-radius:50%;background:#fff;border:3px solid var(--nar);font-size:1.9rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);padding:0;line-height:1">🐝</button>

<!-- VISOR DE FOTO a pantalla completa (tocás la foto y se ve entera) -->
<div id="fotoZoom" onclick="cerrarZoom()" style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.93);align-items:center;justify-content:center;flex-direction:column;padding:16px">
  <button onclick="cerrarZoom()" style="position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.4rem;font-weight:900;cursor:pointer;z-index:2">✕</button>
  <img id="fotoZoomImg" src="" style="max-width:100%;max-height:82vh;object-fit:contain;border-radius:8px">
  <div id="fotoZoomNom" style="color:#fff;font-size:.86rem;font-weight:700;text-align:center;margin-top:14px;max-width:90%"></div>
  <div style="color:rgba(255,255,255,.5);font-size:.72rem;margin-top:6px">Tocá en cualquier lado para cerrar</div>
</div>

<!-- Panel CARRITO -->
<div class="overlay" id="carritoOverlay" onclick="if(event.target===this)cerrarCarrito()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarCarrito()">✕</button>
      <div class="nom">🛒 Mi carrito</div>
    </div>
    <div class="sheet-body" id="carritoBody"></div>
  </div>
</div>

<!-- BARRA INFERIOR fija (estilo Mercado Libre) -->
<div class="tabbar">
  <button id="tb-inicio" class="on" onclick="irAlInicio()"><span class="i">🏠</span>Inicio</button>
  <button id="tb-cats" onclick="tabIr('cats')"><span class="i">🗂️</span>Categorías</button>
  <button onclick="abrirCarrito()" style="position:relative"><span class="i">🛒</span>Carrito<span id="cartBadge" style="display:none;position:absolute;top:0;right:50%;margin-right:-22px;background:var(--nar);color:#fff;font-size:.58rem;font-weight:900;min-width:17px;height:17px;border-radius:9px;align-items:center;justify-content:center;padding:0 4px">0</span></button>
  <button id="tb-favs" onclick="tabIr('favs')"><span class="i">❤️</span>Favoritos</button>
  <button id="tb-mas" onclick="abrirMas()"><span class="i">☰</span>Más</button>
</div>

<script>
/* ═══════════════════════════════════════════════════════════

/* ═══════ 📸 FOTOS — comprimidas para que entren muchas y no se pierdan ═══════
   Se guardan con el catálogo (en la nube de Supabase, tabla tienda_catalogo).
   Están MUY comprimidas para que entren cientos de productos sin llenar el espacio. */
var FOTO_MAX_PX = 520;      // tamaño máximo (suficiente para verse bien)
var FOTO_CALIDAD = 0.72;    // calidad (se ve bien y pesa poco)

/* Comprime una foto para guardarla */
function comprimirFoto(dataUrl, cb){
  var img=new Image();
  img.onload=function(){
    var w=img.width, h=img.height;
    if(w>h && w>FOTO_MAX_PX){ h=Math.round(h*FOTO_MAX_PX/w); w=FOTO_MAX_PX; }
    else if(h>FOTO_MAX_PX){ w=Math.round(w*FOTO_MAX_PX/h); h=FOTO_MAX_PX; }
    var cv=document.createElement('canvas');
    cv.width=w; cv.height=h;
    var ctx=cv.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);   // fondo blanco (los PNG con transparencia pesan más)
    ctx.drawImage(img,0,0,w,h);
    cb(cv.toDataURL('image/jpeg', FOTO_CALIDAD));
  };
  img.onerror=function(){ cb(dataUrl); };
  img.src=dataUrl;
}

/* Cuánto pesa el catálogo (para avisar antes de que se llene) */
function pesoCatalogo(){
  try{
    var txt=JSON.stringify(PRODUCTOS);
    return Math.round(txt.length/1024/1024*10)/10;   // en MB
  }catch(e){ return 0; }
}
/* Achica TODAS las fotos que estén pesadas */
function optimizarFotos(){
  var pesadas=PRODUCTOS.filter(function(p){
    return p.foto && p.foto.indexOf('data:')===0 && p.foto.length>90000;   // más de ~90KB
  });
  if(!pesadas.length){ alert('✅ Tus fotos ya están optimizadas.\n\nPeso del catálogo: '+pesoCatalogo()+' MB'); return; }
  if(!confirm('📸 Encontré '+pesadas.length+' fotos pesadas.\n\nLas voy a achicar para que tu catálogo no se llene y no pierdas nada.\n\nSe van a ver igual de bien. ¿Dale?')) return;

  var hechas=0, total=pesadas.length;
  var antes=pesoCatalogo();
  var box=document.getElementById('adminBody');
  function siguiente(){
    if(!pesadas.length){
      guardarCatalogo();
      render();
      var ahora=pesoCatalogo();
      alert('✅ Listo!\n\n'+hechas+' fotos optimizadas.\n\nAntes: '+antes+' MB\nAhora: '+ahora+' MB\n\nGanaste '+(Math.round((antes-ahora)*10)/10)+' MB de espacio. 🐝');
      abrirSoporte();
      return;
    }
    var p=pesadas.shift();
    if(box) box.innerHTML='<div style="text-align:center;padding:50px 20px"><div style="font-size:2.6rem;margin-bottom:12px">📸</div>'
      +'<div style="font-weight:900;color:var(--az);font-size:1rem;margin-bottom:6px">Optimizando fotos…</div>'
      +'<div style="font-size:.86rem;color:var(--sub)">'+(hechas+1)+' de '+total+'</div>'
      +'<div style="background:#F0F4FF;border-radius:6px;height:8px;margin-top:14px;overflow:hidden"><div style="width:'+Math.round((hechas/total)*100)+'%;height:100%;background:var(--nar);transition:width .3s"></div></div>'
      +'<div style="font-size:.72rem;color:var(--sub);margin-top:10px">No cierres esta pantalla 🐝</div></div>';
    comprimirFoto(p.foto, function(nueva){
      p.foto=nueva;
      hechas++;
      if(hechas%5===0) guardarCatalogo();
      setTimeout(siguiente, 60);
    });
  }
  siguiente();
}

/* ═══════ 📱 PWA — que se instale como app, con el logo de cada tienda ═══════ */
function armarManifest(){
  if(!CONFIG) return;
  var neg=CONFIG.negocio||'Mi Tienda';
  var col=CONFIG.colorPrincipal||'#0B2D6B';
  // el ícono: el logo del dueño, o la abeja si no cargó ninguno
  var icono=CONFIG.logo || iconoAbeja(col, CONFIG.colorAcento||'#FF7A00');

  // los <link> del ícono (para iOS y el favicon)
  var ai=document.getElementById('appleIcon'); if(ai) ai.href=icono;
  var fi=document.getElementById('favIcon'); if(fi) fi.href=icono;
  var tc=document.querySelector('meta[name="theme-color"]'); if(tc) tc.setAttribute('content', col);

  var manifest={
    name: neg,
    short_name: neg.length>12 ? neg.slice(0,12) : neg,
    description: (CONFIG.eslogan||'Tu tienda en cuotas'),
    start_url: window.location.pathname + (TIENDA!=='amarango' ? '?t='+TIENDA : ''),
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#ffffff',
    theme_color: col,
    icons: [
      { src: icono, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: icono, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  var blob=new Blob([JSON.stringify(manifest)], {type:'application/json'});
  var url=URL.createObjectURL(blob);
  var link=document.getElementById('manifestLink');
  if(!link){
    link=document.createElement('link');
    link.rel='manifest';
    link.id='manifestLink';
    document.head.appendChild(link);
  }
  link.href=url;
  document.title=neg;
}
/* Si no cargó logo, dibuja una abeja con los colores de la tienda */
function iconoAbeja(col1, col2){
  var c=document.createElement('canvas');
  c.width=512; c.height=512;
  var x=c.getContext('2d');
  x.fillStyle=col1; x.fillRect(0,0,512,512);
  x.font='300px serif'; x.textAlign='center'; x.textBaseline='middle';
  x.fillText('🐝', 256, 276);
  return c.toDataURL('image/png');
}

/* ═══════════════════════════════════════════════════════════
   🏪 MULTI-TIENDA — el motor de Amarango
   Cada tienda tiene su CÓDIGO, y sus datos se guardan separados.
   Se elige con la dirección:  ...tienda-nueva.html?t=marcelo
   Sin código = 'amarango' (la tienda de Max, por compatibilidad).
   ═══════════════════════════════════════════════════════════ */
function tiendaID(){
  try{
    var p=new URLSearchParams(window.location.search);
    var t=(p.get('t')||'').toLowerCase().replace(/[^a-z0-9_-]/g,'');
    if(t) { try{ localStorage.setItem('ae_tienda_id', t); }catch(e){} return t; }
    var guardada=localStorage.getItem('ae_tienda_id');
    if(guardada) return guardada;
  }catch(e){}
  return 'amarango';   // la de Max por defecto
}

/* ═══════ CARRITO — que el cliente arme una compra de varias cosas ═══════
   Se guarda en su teléfono. Al pedir, va TODO junto por WhatsApp con las
   cuotas del total calculadas. Sin pedirle datos antes (menos fricción = más ventas). */
function cargarCarrito(){ try{ return JSON.parse(localStorage.getItem('ae_carrito')||'[]'); }catch(e){ return []; } }
function guardarCarrito(a){ try{ localStorage.setItem('ae_carrito', JSON.stringify(a)); }catch(e){} actualizarBadgeCarrito(); }
function agregarAlCarrito(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var c=cargarCarrito();
  var id=idProd(p);
  var ya=c.find(function(x){return x.id===id;});
  if(ya){ ya.cant=(ya.cant||1)+1; }
  else { c.push({ id:id, nombre:p.nombre, venta:p.venta, foto:p.foto||'', cant:1 }); }
  guardarCarrito(c);
  toastCarrito('✅ Agregado al carrito');
}
function quitarDelCarrito(id){
  var c=cargarCarrito().filter(function(x){return x.id!==id;});
  guardarCarrito(c); abrirCarrito();
}
function cambiarCant(id, delta){
  var c=cargarCarrito();
  var it=c.find(function(x){return x.id===id;});
  if(!it)return;
  it.cant=(it.cant||1)+delta;
  if(it.cant<1){ c=c.filter(function(x){return x.id!==id;}); }
  guardarCarrito(c); abrirCarrito();
}
function totalCarrito(){ return cargarCarrito().reduce(function(s,x){ return s + x.venta*(x.cant||1); },0); }
function cantCarrito(){ return cargarCarrito().reduce(function(s,x){ return s + (x.cant||1); },0); }

  var n=cantCarrito();

}

    document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(window._toastT);
  window._toastT=setTimeout(function(){ t.style.opacity='0'; }, 1600);
}

function abrirCarrito(){
  var c=cargarCarrito();
  var html='';
  if(!c.length){
    html='<div style="text-align:center;padding:40px 20px;color:var(--sub)"><div style="font-size:3rem;margin-bottom:10px">🛒</div><div style="font-weight:800;color:var(--az);font-size:.95rem">Tu carrito está vacío</div><div style="font-size:.8rem;margin-top:4px">Agregá productos y armá tu pedido.</div></div>';
  } else {
    c.forEach(function(it){
      var sub=it.venta*(it.cant||1);
      html+='<div style="display:flex;gap:11px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:9px">'
        +'<div style="width:54px;height:54px;flex:0 0 auto;border-radius:9px;background:'+(it.foto?'#fff url('+it.foto+') center/contain no-repeat':'#F5F8FF')+';display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:1px solid var(--line)">'+(it.foto?'':'📦')+'</div>'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:.78rem;font-weight:700;color:var(--txt);line-height:1.25">'+it.nombre+'</div>'
          +'<div style="font-size:.84rem;font-weight:900;color:var(--az);margin-top:2px">'+fmt(sub)+'</div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:6px">'

/* El revendedor SOLO trabaja con precio de VENTA. Nunca ve costos ni markup. */
function calcRevendedor(){
  var cont=document.getElementById('revResultado'); if(!cont) return;
  var txt=(document.getElementById('revTxt')||{}).value||'';
  var lineas=txt.split('\n').filter(function(l){return l.trim();});
  if(!lineas.length){ cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:18px;font-size:.82rem">Pegá un producto con su precio de venta. 🐝</div>'; return; }

  var items=[];
  lineas.forEach(function(raw){
    var linea=raw.replace(/[*_#]/g,'').trim(); if(!linea) return;
    var nombre='', venta=0;
    if(linea.indexOf('|')>=0){
      var partes=linea.split('|');
      nombre=partes[0].trim();
      var mp=(partes[1]||'').match(/(\d[\d\.]*)/);
      if(mp) venta=parseInt(mp[1].replace(/\./g,''),10);
    } else {
      var md=linea.match(/\$\s*(\d[\d\.]{2,})/) || linea.match(/(\d[\d\.]{4,})/);
      if(md){ venta=parseInt(md[1].replace(/\./g,''),10); nombre=limpiarNombre(linea.replace(md[0],'')); }
    }
    if(venta && nombre && nombre.length>2) items.push({nombre:nombre, venta:venta});
  });
  if(!items.length){ cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:18px;font-size:.82rem">No encontré el precio. Probá: <b>Nombre | Precio</b></div>'; return; }

  var html='', msgs=[];
  items.forEach(function(it){
    var cuotasHtml='', waLines=[];
    cuotasActivas().forEach(function(n){
      var vc=valorCuota(it.venta,n);
      cuotasHtml+='<div style="background:rgba(255,255,255,.09);border-left:3px solid var(--nar);border-radius:9px;padding:9px 12px;display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:.78rem;font-weight:800;color:#fff">'+n+' cuotas fijas</span><span style="font-size:.95rem;font-weight:900;color:#ffb968">'+fmt(vc)+'</span></div>';
      waLines.push('💳 '+n+' cuotas fijas de '+fmt(vc));
    });
    html+='<div style="background:linear-gradient(160deg,#020c2e,var(--az));border-radius:15px;padding:16px;color:#fff;margin-bottom:10px">'
      +'<div style="text-align:center;font-size:.88rem;font-weight:900;margin-bottom:5px">'+it.nombre+'</div>'
      +'<div style="text-align:center;font-size:1.5rem;font-weight:900;margin-bottom:12px">'+fmt(it.venta)+'<div style="font-size:.6rem;color:rgba(255,255,255,.6);font-weight:700">PRECIO CONTADO</div></div>'
      +cuotasHtml
      +'<div style="text-align:center;font-size:.64rem;color:rgba(255,255,255,.7);margin-top:8px">'+firmaTienda()+' 🐝</div>'
      +'</div>';
    msgs.push('*'+it.nombre.toUpperCase()+'*\n\n'+waLines.join('\n')+'\n\n➡️ Contado: '+fmt(it.venta));
  });
  html+='<button onclick="compartirRevendedor()" style="width:100%;background:#25D366;color:#fff;border:none;border-radius:13px;padding:14px;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit">💬 Compartir por WhatsApp</button>';
  cont.innerHTML=html;
  window._revMsg=msgs.join('\n\n———\n\n')+'\n'+firmaTienda()+' 🐝';
}
function compartirRevendedor(){
  if(navigator.share){ navigator.share({text:window._revMsg}).catch(function(){ window.open('https://wa.me/?text='+encodeURIComponent(window._revMsg),'_blank'); }); }
  else window.open('https://wa.me/?text='+encodeURIComponent(window._revMsg),'_blank');
}

/* ═══════ SUSCRIPTORES (libreta de control de la membresía) ═══════
   Se guarda en Supabase (tabla 'amarango_subs'). Si la tabla no existe
   todavía, funciona igual en el teléfono (localStorage) y avisa. */
var SUBS = [];
function subsCargar(cb){
  // primero lo del teléfono (rápido)
  try{ SUBS = JSON.parse(localStorage.getItem('ae_subs')||'[]'); }catch(e){ SUBS=[]; }
  if(cb) cb();
  // después la nube (si conecta)
  if(sb){
    sb.from('amarango_subs').select('datos').eq('id','lista').maybeSingle()
      .then(function(r){ if(r&&r.data&&r.data.datos){ SUBS=r.data.datos; try{localStorage.setItem('ae_subs',JSON.stringify(SUBS));}catch(e){} if(cb)cb(); } })
      .catch(function(){});
  }
}
function subsGuardar(){
  try{ localStorage.setItem('ae_subs', JSON.stringify(SUBS)); }catch(e){}
  if(sb){
    sb.from('amarango_subs').upsert({id:'lista', datos:SUBS}).then(function(){}).catch(function(){});
  }
}
function abrirSuscriptores(){ subsCargar(renderSubs); }

function guardarSub(i){
  var g=function(id){ var e=document.getElementById(id); return e?e.value.trim():''; };
  var obj={ nombre:g('sb_nombre'), negocio:g('sb_negocio'), vende:g('sb_vende'), whatsapp:g('sb_whatsapp'), pagaHasta:g('sb_pagaHasta'), monto:g('sb_monto'), nota:g('sb_nota'), estado: i>=0?SUBS[i].estado:'ok' };
  if(!obj.nombre){ alert('Poné al menos el nombre.'); return; }
  if(i>=0) SUBS[i]=obj; else SUBS.push(obj);

function avisarSub(i){
  var s=SUBS[i]; if(!s.whatsapp) return;
  var msg = s.estado==='ok'
    ? 'Hola '+s.nombre+'! Te recuerdo que tu Amarango está activa 🐝. ¡A vender!'
    : 'Hola '+s.nombre+'! Tu suscripción a Amarango venció. Para reactivarla, pasá el pago y la habilito al toque 🐝';
  window.open('https://wa.me/'+s.whatsapp.replace(/[^0-9]/g,'')+'?text='+encodeURIComponent(msg),'_blank');

   Acá vive TODO lo que cambia entre una tienda y otra: marca, colores,
   cuotas, clave. Cambiar esto = crear una tienda nueva.
   AmarangoElectro es simplemente la primera config. */
var CONFIG_DEFAULT = {
  negocio: "AmarangoElectro", eslogan: "Equipá tu casa en cuotas",
  instagram: "@amarangoelectro", whatsapp: "", logo: "",
  colorPrincipal: "#0B2D6B", colorAcento: "#FF7A00",
  cuotas: { 2:15, 4:55, 6:78 },
  modoVenta: 'cuotas',     // 'cuotas' | 'contado' — define TODA la experiencia
  planesActivos: [2,4,6],  // qué planes se muestran (editable, hasta 12)
  markup: [ {hasta:50000,pct:80}, {hasta:100000,pct:60}, {hasta:250000,pct:50}, {hasta:350000,pct:40}, {hasta:999999999,pct:30} ],
  dolar: 1500,
  formatoCuota: 'simple',  // 'simple' | 'caja' | 'destacado'
  duenoPlataforma: true,   // true = Max (ve Suscriptores) · false = cliente (Marcelo, no lo ve)
  admins: [],              // los que COBRAN (botón Comprar) — [{nombre,wa}]
  vendedores: [],          // los que ATIENDEN (botón Consultar) — [{nombre,wa}]
  pin: "2580",
  pinRev: "1234"
};
/* La firma que va al pie de cada mensaje. Sale de la CONFIG de cada tienda. */
function firmaTienda(){
  if(!CONFIG) return '';
  if(CONFIG.instagram) return CONFIG.instagram;
  if(CONFIG.negocio) return CONFIG.negocio;
  return '';
}

var CONFIG = null;
function cargarConfig(cb){
  try{ var l=localStorage.getItem(lsKey('ae_config')); if(l) CONFIG=JSON.parse(l); }catch(e){}
  if(!CONFIG){
    CONFIG=JSON.parse(JSON.stringify(CONFIG_DEFAULT));
    // Si NO es la tienda de Max → arranca VACÍA, sin marca ajena
    if(TIENDA!=='amarango'){
      CONFIG.negocio='Mi Tienda';
      CONFIG.eslogan='';
      CONFIG.instagram='';
      CONFIG.whatsapp='';
      CONFIG.logo='';
      CONFIG.admins=[];
      CONFIG.vendedores=[];
      CONFIG.duenoPlataforma=false;   // no ve Suscripciones (eso es de Max)
    }
  }
  aplicarConfig();
  if(cb) cb();
  if(sb){
    sb.from('amarango_config').select('datos').eq('id',keyConfig()).maybeSingle()
      .then(function(r){ if(r&&r.data&&r.data.datos){ CONFIG=Object.assign(JSON.parse(JSON.stringify(CONFIG_DEFAULT)), r.data.datos); try{localStorage.setItem(lsKey('ae_config'),JSON.stringify(CONFIG));}catch(e){} aplicarConfig(); render(); } })
      .catch(function(){});
  }
}
function guardarConfig(){
  try{ localStorage.setItem(lsKey('ae_config'), JSON.stringify(CONFIG)); }catch(e){}
  if(sb){ sb.from('amarango_config').upsert({id:keyConfig(), datos:CONFIG}).then(function(){}).catch(function(){}); }
  aplicarConfig();
}
function aplicarConfig(){
  if(!CONFIG) return;
  PIN_DUENO = CONFIG.pin || "2580";
  PIN_REVENDEDOR = CONFIG.pinRev || "1234";
  // arma los planes según lo que el dueño configuró
  PLANES={};
  if(CONFIG.modoVenta!=='contado'){
    var activos = CONFIG.planesActivos || [2,4,6];
    activos.forEach(function(n){
      var pct = (CONFIG.cuotas && CONFIG.cuotas[n]!=null) ? CONFIG.cuotas[n] : 0;
      PLANES[n] = {on:true, pct:pct};
    });
  }
  var h=document.querySelector('.brand h1'); if(h) h.textContent=CONFIG.negocio;
  // logo: imagen si hay, abeja si no (el gesto secreto funciona igual)
  var bee=document.getElementById('beeLogo');
  if(bee){
    if(CONFIG.logo){ bee.innerHTML=''; bee.style.cssText='cursor:pointer;width:34px;height:34px;border-radius:8px;background:url('+CONFIG.logo+') center/cover;display:inline-block;vertical-align:middle'; }
    else { bee.textContent='🐝'; bee.style.cssText='cursor:pointer'; }
  }
  document.documentElement.style.setProperty('--az', CONFIG.colorPrincipal);
  document.documentElement.style.setProperty('--nar', CONFIG.colorAcento);
  try{ armarManifest(); }catch(e){}   // el ícono de la app toma el logo de la tienda
}
/* ═══════ FORMATOS DE CUOTA — cada tienda elige cómo mostrar el precio ═══════ */
function precioTarjeta(p){
  var mc=mejorCuota(p.venta);
  var fmt_=(CONFIG&&CONFIG.formatoCuota)||'simple';
  var enOferta = p.precioAntes && parseFloat(p.precioAntes)>parseFloat(p.venta);
  var tachado = enOferta ? '<span style="text-decoration:line-through;color:#bbb;font-size:.7rem">'+fmt(p.precioAntes)+'</span> ' : '';

  if(fmt_==='caja'){
    // estilo Frávega: cajita naranja con la cuota bien grande
    if(!mc) return '<div class="cuota-v">'+fmt(p.venta)+'</div>';
    return '<div style="background:#FFF6EE;border:1px solid #FFE0C2;border-radius:9px;padding:8px 10px;margin-bottom:6px">'
      +'<div style="font-size:.6rem;font-weight:800;color:var(--nar);text-transform:uppercase;letter-spacing:.3px">'+mc.n+' cuotas fijas de</div>'
      +'<div style="font-size:1.15rem;font-weight:900;color:var(--az);line-height:1.1">'+fmt(mc.valor)+'</div>'
      +'</div>'
      +'<div class="contado">'+tachado+'Contado: '+fmt(p.venta)+'</div>';
  }
  if(fmt_==='destacado'){
    // el CONTADO grande arriba, la cuota abajo chiquita
    return '<div style="font-size:1.15rem;font-weight:900;color:var(--az);line-height:1.1">'+tachado+fmt(p.venta)+'</div>'
      +(mc?'<div style="font-size:.68rem;color:var(--gr);font-weight:700;margin-top:2px">💳 '+mc.n+' cuotas de '+fmt(mc.valor)+'</div>':'')
      +'<div style="height:6px"></div>';
  }
  // 'simple' (por defecto): la CUOTA grande en naranja, el contado abajo
  return (mc?'<div class="cuota-v">'+fmt(mc.valor)+'</div><div class="cuota-n">en '+mc.n+' cuotas fijas</div>':'')
    +'<div class="contado">'+tachado+'Contado: '+fmt(p.venta)+'</div>';
}

/* Checklist: le muestra al dueño qué le falta poner de SU marca */
function checklistMarca(){
  var c=CONFIG||{};
  var faltan=[];
  if(!c.negocio || c.negocio==='Mi Tienda' || (TIENDA!=='amarango' && /amarango/i.test(c.negocio))) faltan.push('El nombre de tu negocio');

function renderClientes(){
  // cruza clientes con sus pedidos
  function pedidosDe(wa){
    var w=String(wa||'').replace(/[^0-9]/g,'');
    return (PEDIDOS||[]).filter(function(p){
      return p.cliente && String(p.cliente.wa||'').replace(/[^0-9]/g,'')===w;
    });
  }
  var html='<div style="font-weight:900;color:var(--az);font-size:1.05rem;margin-bottom:4px">👥 Clientes</div>'

function descargarBackup(){
  var cliente=null;
  try{ cliente=JSON.parse(localStorage.getItem('ae_cliente')||'null'); }catch(e){}
  var data={
    version: 1,
    tienda: TIENDA,
    fecha: Date.now(),
    fechaLegible: new Date().toLocaleString('es-AR'),
    config: CONFIG,
    productos: PRODUCTOS,
    pedidos: PEDIDOS||[],
    subs: (typeof SUBS!=='undefined') ? SUBS : []
  };
  var txt=JSON.stringify(data, null, 2);
  var blob=new Blob([txt], {type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var neg=(CONFIG.negocio||'tienda').replace(/[^a-zA-Z0-9]/g,'-').toLowerCase();
  var f=new Date();
  var fecha=f.getFullYear()+'-'+String(f.getMonth()+1).padStart(2,'0')+'-'+String(f.getDate()).padStart(2,'0');
  a.href=url;
  a.download='backup-'+neg+'-'+fecha+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  try{ localStorage.setItem(lsKey('ae_ultimo_backup'), String(Date.now())); }catch(e){}
  alert('✅ Copia descargada.\n\nGuardala en un lugar seguro (Drive, mail, lo que uses). Si algo sale mal, con este archivo recuperás todo. 🐝');
  abrirBackup();
}

function restaurarBackup(ev){
  var file=ev.target.files && ev.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var data;
    try{ data=JSON.parse(e.target.result); }
    catch(err){ alert('❌ Ese archivo no es una copia válida.'); return; }
    if(!data || !data.productos){ alert('❌ Ese archivo no parece una copia de tu tienda.'); return; }

    var f=data.fechaLegible || new Date(data.fecha||0).toLocaleString('es-AR');
    var msg='⚠️ ATENCIÓN\n\nVas a REEMPLAZAR todo lo que tenés ahora por esta copia:\n\n'
      +'📅 Fecha: '+f+'\n'
      +'🏪 Tienda: '+(data.tienda||'?')+'\n'
      +'📦 '+(data.productos?data.productos.length:0)+' productos\n'
      +'📋 '+(data.pedidos?data.pedidos.length:0)+' pedidos\n\n'
      +'¿Seguro?';
    if(!confirm(msg)) return;
    if(!confirm('Última confirmación:\n\nLo que tenés ahora se va a la papelera.\n¿Restaurar esta copia?')) return;

    // respaldo de lo actual antes de pisar
    guardarEnPapelera(PRODUCTOS);

    if(data.config){ CONFIG=data.config; guardarConfig(); }
    PRODUCTOS=data.productos;
    guardarCatalogo();
    if(data.pedidos){ PEDIDOS=data.pedidos; guardarPedidos(); }
    if(data.subs && typeof SUBS!=='undefined'){ SUBS=data.subs; subsGuardar(); }

    aplicarConfig();
    render();
    alert('✅ Copia restaurada.\n\nTu tienda volvió al estado del '+f+'. 🐝');
    cerrarAdmin();
  };
  reader.readAsText(file);
}

function generarPDF(){
  var cat=(document.getElementById('pdfCat')||{}).value||'';
  var soloFoto=(document.getElementById('pdfSoloFoto')||{}).checked;
  var lista=PRODUCTOS.filter(function(p){
    if(p.visible===false || p.sinStock) return false;
    if(cat && catProd(p)!==cat) return false;
    if(soloFoto && !p.foto) return false;
    return true;
  });
  if(!lista.length){ alert('No hay productos con ese filtro.'); return; }

  var neg=(CONFIG.negocio||'Mi Tienda');
  var ig=(CONFIG.instagram||'');
  var wa=(CONFIG.whatsapp||'');
  var logo=CONFIG.logo||'';
  var col1=CONFIG.colorPrincipal||'#0B2D6B';
  var col2=CONFIG.colorAcento||'#FF7A00';
  var hoy=new Date().toLocaleDateString('es-AR');

  // arma las tarjetas, 3 por fila
  var cards=lista.map(function(p){
    var cuotasHtml=cuotasActivas().map(function(n){
      return '<div class="cu"><span>'+n+' cuotas</span><b>'+fmt(valorCuota(p.venta,n))+'</b></div>';
    }).join('');
    var enOferta = p.precioAntes && p.precioAntes>p.venta;
    return '<div class="card">'
      +(p.foto?'<div class="foto"><img src="'+p.foto+'"></div>':'<div class="foto sinf">📦</div>')
      +'<div class="nom">'+p.nombre+'</div>'
      +(enOferta?'<div class="antes">'+fmt(p.precioAntes)+'</div>':'')
      +'<div class="precio">'+fmt(p.venta)+'</div>'
      +'<div class="cuotas">'+cuotasHtml+'</div>'
      +'</div>';
  }).join('');

/* ═══════ 📊 ESTADÍSTICAS — que el dueño vea cómo anda su negocio ═══════ */
function abrirEstadisticas(){ cargarPedidos(renderEstadisticas); }
function renderEstadisticas(){
  var ahora=Date.now();
  var mes=30*86400000, semana=7*86400000;

  var vendidos=PEDIDOS.filter(function(p){return p.estado==='vendido';});
  var totalMes=vendidos.filter(function(p){return ahora-p.fecha<mes;}).reduce(function(s,p){return s+p.total;},0);
  var totalSem=vendidos.filter(function(p){return ahora-p.fecha<semana;}).reduce(function(s,p){return s+p.total;},0);
  var pedidosMes=PEDIDOS.filter(function(p){return ahora-p.fecha<mes;}).length;
  var vendMes=vendidos.filter(function(p){return ahora-p.fecha<mes;}).length;
  var conversion = pedidosMes ? Math.round(vendMes/pedidosMes*100) : 0;
  var ticket = vendMes ? Math.round(totalMes/vendMes) : 0;

  // productos más pedidos
  var conteo={};
  PEDIDOS.forEach(function(p){
    p.items.forEach(function(it){
      if(!conteo[it.nombre]) conteo[it.nombre]={n:0, plata:0};
      conteo[it.nombre].n += (it.cant||1);
      conteo[it.nombre].plata += it.venta*(it.cant||1);
    });
  });
  var top=Object.keys(conteo).map(function(k){ return {nombre:k, n:conteo[k].n, plata:conteo[k].plata}; })
    .sort(function(a,b){ return b.n-a.n; }).slice(0,6);

  // quién vende más del equipo
  var porVend={};
  vendidos.forEach(function(p){
    var v=p.atendio||'(sin asignar)';
    if(!porVend[v]) porVend[v]={n:0, plata:0};
    porVend[v].n++; porVend[v].plata+=p.total;
  });
  var equipo=Object.keys(porVend).map(function(k){ return {nombre:k, n:porVend[k].n, plata:porVend[k].plata}; })
    .sort(function(a,b){ return b.plata-a.plata; });

  var html='<div style="font-weight:900;color:var(--az);font-size:1.05rem;margin-bottom:12px">📊 Estadísticas</div>';

  if(!PEDIDOS.length){
    html+='<div style="text-align:center;color:var(--sub);padding:36px 20px;font-size:.85rem"><div style="font-size:2.6rem;margin-bottom:8px">📊</div>Todavía no hay datos.<br><span style="font-size:.75rem">Cuando tengas pedidos, acá vas a ver cómo anda tu negocio. 🐝</span></div>'
      +'<button onclick="abrirPanelDueno()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--az);border-radius:11px;padding:11px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px">‹ Volver al panel</button>';
    document.getElementById('adminBody').innerHTML=html;
    document.getElementById('adminOverlay').classList.add('on'); empujarPantalla('admin', cerrarAdmin);
    return;
  }

  // ── plata
  html+='<div style="background:linear-gradient(160deg,#020c2e,var(--az));border-radius:16px;padding:16px;color:#fff;margin-bottom:12px">'
    +'<div style="font-size:.62rem;font-weight:800;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.6px">Vendiste este mes</div>'
    +'<div style="font-size:1.9rem;font-weight:900;line-height:1.1;margin:2px 0 8px">'+fmt(totalMes)+'</div>'
    +'<div style="display:flex;gap:14px;font-size:.72rem;color:rgba(255,255,255,.75)">'
      +'<span>📅 Esta semana: <b style="color:#ffb968">'+fmt(totalSem)+'</b></span>'
    +'</div></div>';

  // ── números clave
  html+='<div style="display:flex;gap:7px;margin-bottom:14px">'
    +'<div style="flex:1;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;text-align:center"><div style="font-size:1.2rem;font-weight:900;color:var(--az)">'+vendMes+'</div><div style="font-size:.56rem;color:var(--sub);font-weight:800">VENTAS (30d)</div></div>'
    +'<div style="flex:1;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;text-align:center"><div style="font-size:1.2rem;font-weight:900;color:'+(conversion>=50?'#059669':'#EA580C')+'">'+conversion+'%</div><div style="font-size:.56rem;color:var(--sub);font-weight:800">SE CIERRAN</div></div>'
    +'<div style="flex:1.3;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;text-align:center"><div style="font-size:.88rem;font-weight:900;color:var(--az)">'+fmt(ticket)+'</div><div style="font-size:.56rem;color:var(--sub);font-weight:800">TICKET PROM.</div></div>'
    +'</div>';

  // ── lo que más se pide
  if(top.length){
    html+='<div style="font-weight:900;color:var(--az);font-size:.88rem;margin-bottom:8px">🔥 Lo que más te piden</div>';
    var maxN=top[0].n;
    top.forEach(function(t,i){
      var pct=Math.round(t.n/maxN*100);
      html+='<div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
          +'<span style="font-size:.78rem;font-weight:800;color:var(--az);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(i+1)+'. '+t.nombre+'</span>'
          +'<span style="font-size:.7rem;font-weight:900;color:var(--nar)">'+t.n+'x</span>'
        +'</div>'
        +'<div style="background:#F0F4FF;border-radius:4px;height:6px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:var(--nar)"></div></div>'
        +'</div>';
    });
  }

  // ── quién vende más
  if(equipo.length){
    html+='<div style="font-weight:900;color:var(--az);font-size:.88rem;margin:14px 0 8px">🤝 Tu equipo</div>';

      var medalla = i===0?'🥇':(i===1?'🥈':(i===2?'🥉':'  '));
      html+='<div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px">'
        +'<span style="font-size:1.1rem">'+medalla+'</span>'
        +'<span style="flex:1;font-size:.82rem;font-weight:800;color:var(--az)">'+e.nombre+'</span>'
        +'<span style="text-align:right"><span style="display:block;font-size:.86rem;font-weight:900;color:var(--az)">'+fmt(e.plata)+'</span>'
        +'<span style="display:block;font-size:.62rem;color:var(--sub)">'+e.n+' venta'+(e.n===1?'':'s')+'</span></span>'
        +'</div>';
    });
  }

  // ── catálogo
  var conFoto=PRODUCTOS.filter(function(p){return p.foto;}).length;
  var ocultos=PRODUCTOS.filter(function(p){return p.visible===false;}).length;
  var viejos=PRODUCTOS.filter(function(p){return p.fechaPrecio && (ahora-p.fechaPrecio)>30*86400000;}).length;
  html+='<div style="font-weight:900;color:var(--az);font-size:.88rem;margin:14px 0 8px">📦 Tu catálogo</div>'
    +'<div style="background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px;font-size:.78rem;color:var(--sub);line-height:1.9">'
      +'📦 <b style="color:var(--az)">'+PRODUCTOS.length+'</b> productos cargados<br>'
      +'📷 <b style="color:var(--az)">'+conFoto+'</b> con foto'+(PRODUCTOS.length-conFoto>0?' · <span style="color:#EA580C">'+(PRODUCTOS.length-conFoto)+' sin foto</span>':'')+'<br>'
      +(ocultos?'🙈 <b style="color:var(--az)">'+ocultos+'</b> ocultos de la tienda<br>':'')
      +(viejos?'<span style="color:#DC2626">🔴 <b>'+viejos+'</b> con precio de +30 días — actualizalos</span>':'🟢 Precios al día')
    +'</div>';

  html+='<button onclick="abrirPanelDueno()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--az);border-radius:11px;padding:11px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:12px">‹ Volver al panel</button>';
  document.getElementById('adminBody').innerHTML=html;
  document.getElementById('adminOverlay').classList.add('on'); empujarPantalla('admin', cerrarAdmin);
}

  ped.remito='R-'+String(n).padStart(5,'0');
  guardarPedidos();
  return ped.remito;
}

/* ═══════ HISTORIAL DE PEDIDOS ═══════
   Cada vez que un cliente toca Comprar o pide del carrito, se guarda acá.
   Es el cimiento de las estadísticas y del algoritmo de sugeridos. */
function keyPedidos(){ return TIENDA==='amarango' ? 'pedidos' : 'pedidos_'+TIENDA; }
var PEDIDOS=[];

function guardarPedido(items, total, contacto){
  var cli=null;
  try{ cli=JSON.parse(localStorage.getItem('ae_cliente')||'null'); }catch(e){}
  var ped={
    id:'ped'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    fecha: Date.now(),
    items: items,                          // [{nombre, venta, cant}]
    total: total,
    cliente: cli ? {nombre:cli.nombre, wa:cli.wa, loc:cli.loc} : null,
    atendio: contacto || '',               // con quién habló
    estado: 'nuevo'                        // nuevo · vendido · perdido
  };
  PEDIDOS.unshift(ped);
  _mapaJuntos=null;   // el algoritmo aprende del pedido nuevo
  try{ localStorage.setItem(lsKey('ae_pedidos'), JSON.stringify(PEDIDOS)); }catch(e){}
  if(sb){ sb.from('tienda_catalogo').upsert({id:keyPedidos(), datos:PEDIDOS}).then(function(){}).catch(function(){}); }
}
function cargarPedidos(cb){
  try{ PEDIDOS=JSON.parse(localStorage.getItem(lsKey('ae_pedidos'))||'[]'); }catch(e){ PEDIDOS=[]; }
  if(cb) cb();
  if(sb){
    sb.from('tienda_catalogo').select('datos').eq('id',keyPedidos()).maybeSingle()
      .then(function(r){ if(r&&r.data&&r.data.datos){ PEDIDOS=r.data.datos; try{localStorage.setItem(lsKey('ae_pedidos'),JSON.stringify(PEDIDOS));}catch(e){} if(cb)cb(); } })
      .catch(function(){});
  }
}
function guardarPedidos(){
  try{ localStorage.setItem(lsKey('ae_pedidos'), JSON.stringify(PEDIDOS)); }catch(e){}
  if(sb){ sb.from('tienda_catalogo').upsert({id:keyPedidos(), datos:PEDIDOS}).then(function(){}).catch(function(){}); }
}

function abrirPedidos(){ cargarPedidos(renderPedidos); }
function renderPedidos(){
  var nuevos=PEDIDOS.filter(function(p){return p.estado==='nuevo';}).length;
  var vendidos=PEDIDOS.filter(function(p){return p.estado==='vendido';});
  var facturado=vendidos.reduce(function(s,p){return s+p.total;},0);

  var html='<div style="font-weight:900;color:var(--az);font-size:1.05rem;margin-bottom:12px">📋 Historial de pedidos</div>';
  // resumen arriba
  html+='<div style="display:flex;gap:7px;margin-bottom:14px">'
    +'<div style="flex:1;background:#FFF7ED;border:1px solid #FED7AA;border-radius:11px;padding:10px;text-align:center"><div style="font-size:1.3rem;font-weight:900;color:#EA580C">'+nuevos+'</div><div style="font-size:.58rem;color:#EA580C;font-weight:800">NUEVOS</div></div>'
    +'<div style="flex:1;background:#F0FDF4;border:1px solid #A7F3D0;border-radius:11px;padding:10px;text-align:center"><div style="font-size:1.3rem;font-weight:900;color:#059669">'+vendidos.length+'</div><div style="font-size:.58rem;color:#059669;font-weight:800">VENDIDOS</div></div>'
    +'<div style="flex:1.4;background:#F5F8FF;border:1px solid #DDE7FA;border-radius:11px;padding:10px;text-align:center"><div style="font-size:.95rem;font-weight:900;color:var(--az)">'+fmt(facturado)+'</div><div style="font-size:.58rem;color:var(--az);font-weight:800">FACTURADO</div></div>'
    +'</div>';

  if(!PEDIDOS.length){
    html+='<div style="text-align:center;color:var(--sub);padding:34px 20px;font-size:.85rem"><div style="font-size:2.6rem;margin-bottom:8px">📭</div>Todavía no hay pedidos.<br><span style="font-size:.75rem">Cuando un cliente toque «Comprar», el pedido aparece acá. 🐝</span></div>';
  } else {
    PEDIDOS.forEach(function(ped,i){
      var f=new Date(ped.fecha);

function opcProd(idx,k,ico,txt,on,peligro){
  var colOn = peligro ? '#DC2626' : 'var(--nar)';
  var bgOn  = peligro ? '#FEF2F2' : '#FFF0E0';
  return '<button onclick="toggleOpcProd('+idx+',\''+k+'\')" style="width:100%;text-align:left;border:1.5px solid '+(on?colOn:'var(--line)')+';background:'+(on?bgOn:'#fff')+';color:'+(on?colOn:'var(--sub)')+';border-radius:11px;padding:12px 14px;font-size:.82rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:7px;display:flex;align-items:center;gap:9px">'
    +'<span style="font-size:1rem">'+(on?'✅':ico)+'</span><span>'+txt+'</span></button>';
}
function toggleOpcProd(idx,k){
  var p=PRODUCTOS[idx]; if(!p)return;
  if(k==='destacado'){ p.destacado=!p.destacado; }
  else if(k==='delDia'){
    var era=p.delDia;
    PRODUCTOS.forEach(function(x){ x.delDia=false; });   // solo puede haber uno
    p.delDia=!era;
  }
  else if(k==='ultimas'){ p.ultimas=!p.ultimas; }
  else if(k==='sinInteres'){ p.sinInteres=!p.sinInteres; }
  else if(k==='sinStock'){ p.sinStock=!p.sinStock; }
  else if(k==='oculto'){
    p.visible = (p.visible===false) ? true : false;
  }
  else if(k==='oferta'){
    var enOferta = p.precioAntes && p.precioAntes>p.venta;
    if(enOferta){ delete p.precioAntes; }
    else {
      var sug=Math.round(p.venta*1.25/500)*500;
      var v=prompt('🔥 Precio ANTES (el que se muestra tachado):\n\nEl precio actual es '+fmt(p.venta)+'.\nPoné uno más alto para que se vea la rebaja.', sug);
      if(v===null) return;
      var pa=parseFloat(v)||0;
      if(pa<=p.venta){ alert('El precio tachado tiene que ser MÁS ALTO que '+fmt(p.venta)+'.'); return; }
      p.precioAntes=pa;
    }
  }
  guardarCatalogo();
  render();
  // si el panel de opciones está abierto, lo refresca ahí mismo
  var adminAbierto = document.getElementById('adminOverlay').classList.contains('on');
  if(adminAbierto){ abrirOpcionesRapidas(idx); }
  else { verDetalle(idx); setTimeout(toggleCajonOpciones, 50); }
}

/* Sube el logo, lo achica automáticamente (máx 240px) y lo guarda */
function subirLogo(ev){
  var file = ev.target.files && ev.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var max=240, w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>max){ w=Math.round(w*max/h); h=max; }
      var canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var data=canvas.toDataURL('image/png');
      CONFIG.logo = data;
      // preview al toque
      var pv=document.getElementById('logoPreview');
      if(pv){ pv.style.background='url('+data+') center/cover'; pv.textContent=''; }
      alert('✅ Logo cargado. Tocá «Guardar cambios» para aplicarlo.');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function quitarLogo(){

function subirFotoCatalogo(ev){
  var file=ev.target.files&&ev.target.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var max=900,w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);

    };

  };

}

/* Parser: Nombre | Precio  (lo que sigue a la barra es el precio, lo demás se descarta) */
var _catParsed=[];
function parsearCatalogo(){
  var txt=document.getElementById('catTxt'); if(!txt)return;
  var lineas=(txt.value||'').split('\n');
  var cot=parseFloat((document.getElementById('catDolar')||{}).value)||CONFIG.dolar||1500;
  _catParsed=[];
  lineas.forEach(function(raw){
    var linea=raw.replace(/[*_#]/g,'').trim();
    if(!linea) return;
    var nombre='', precio=0;
    if(linea.indexOf('|')>=0){
      var partes=linea.split('|');
      nombre=partes[0].trim();
      var ps=(partes[1]||'').trim();          // ← lo que sigue a la barra = precio
      var mp=ps.match(/(\d[\d\.]*)/);
      if(mp) precio=parseInt(mp[1].replace(/\./g,''),10);
    } else {
      // sin barra: busca un precio con $ o usd en la línea
      var mu=linea.match(/(\d{2,4})\s*usd/i);
      var md=linea.match(/\$\s*(\d[\d\.]{2,})/) || linea.match(/(\d[\d\.]{2,})\s*\$/);
      if(mu){ precio=parseInt(mu[1],10); nombre=limpiarNombre(linea.replace(/\d{2,4}\s*usd/i,'')); }
      else if(md){ precio=parseInt(md[1].replace(/\./g,''),10); nombre=limpiarNombre(linea.replace(md[0],'')); }
    }
    if(!precio || !nombre || nombre.length<3) return;
    var costo, venta;
    if(_catModo==='usd'){ costo=Math.round(precio*cot); venta=markupDeCosto(costo); }
    else if(_catModo==='costo'){ costo=precio; venta=markupDeCosto(costo); }
    else { costo=null; venta=precio; }
    _catParsed.push({ nombre:nombre, costo:costo, venta:venta, usd:(_catModo==='usd'?precio:null) });
  });
  renderCatPreview();
}
function renderCatPreview(){
  var c=document.getElementById('catPreview'); if(!c)return;
  if(!_catParsed.length){ c.innerHTML=''; return; }
  var html='<div style="font-weight:900;color:var(--az);font-size:.86rem;margin-bottom:7px">✅ '+_catParsed.length+' producto'+(_catParsed.length===1?'':'s')+' detectado'+(_catParsed.length===1?'':'s')+'</div>';
  _catParsed.slice(0,8).forEach(function(p){
    html+='<div style="background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin-bottom:5px">'
      +'<div style="font-size:.76rem;font-weight:700;color:var(--txt)">'+p.nombre+'</div>'
      +'<div style="font-size:.66rem;color:var(--sub)">'+(p.usd?'U$'+p.usd+' → ':'')+'Vende: <b style="color:var(--az)">'+fmt(p.venta)+'</b> · 6 cuotas '+fmt(valorCuota(p.venta,6))+'</div></div>';
  });
  if(_catParsed.length>8) html+='<div style="text-align:center;font-size:.72rem;color:var(--sub);padding:4px">…y '+(_catParsed.length-8)+' más</div>';
  c.innerHTML=html;
}

function subirFotoProd(ev){
  var file=ev.target.files&&ev.target.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var max=900,w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
      _cargaFoto=cv.toDataURL("image/jpeg",0.88);
      var pv=document.getElementById('cargaFotoPrev'); if(pv){pv.style.background='url('+_cargaFoto+') center/cover';pv.textContent='';}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
