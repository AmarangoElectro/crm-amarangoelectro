/* Parser: cada línea que tenga un precio es un producto */
function parsearMasivo(){
  var txt=document.getElementById('masivoTxt').value||'';
  var cot=parseFloat(document.getElementById('masivoDolar').value)||1500;
  var lineas=txt.split('\n');
  _masivoParsed=[];
  lineas.forEach(function(raw){
    var linea=raw.replace(/[*_#]/g,'').trim();
    if(!linea) return;
    var precio=0, esUsd=false, nombre='', dudoso=false;

    // ===== FORMATO BARRITA: Nombre | Precio =====
    // REGLA DE MAX: lo que sigue a la PRIMERA barra es el precio.
    // Todo lo que venga después del precio se descarta.
    if(linea.indexOf('|')>=0){
      var partes=linea.split('|');
      nombre=partes[0].trim();
      var precioStr=(partes[1]||'').trim();   // ← el que sigue a la barra, siempre
      var mu=precioStr.match(/(\d[\d\.]*)\s*usd/i);
      if(mu){ precio=parseInt(mu[1].replace(/\./g,''),10); esUsd=true; }
      else { var mp=precioStr.match(/(\d[\d\.]*)/); if(mp){ precio=parseInt(mp[1].replace(/\./g,''),10); esUsd=/usd/i.test(precioStr); } }
      if(!precio || !nombre) return;
      pushProd(nombre, precio, esUsd, /oferta/i.test(linea), false, cot); return;
    }

    // ===== USD explícito (celulares mayorista): "110usd" =====
    var mUsd=linea.match(/(\d{2,4})\s*usd/i);
    if(mUsd){
      precio=parseInt(mUsd[1],10); esUsd=true;
      nombre=limpiarNombre(linea.replace(/\d{2,4}\s*usd/i,''));
      if(nombre.length>=3) pushProd(nombre, precio, esUsd, /oferta/i.test(linea), false, cot);
      return;
    }

    // ===== PRECIO CON $ (la regla principal de Max): $27.000, $ 27.000, 27.000$ =====
    // busca un número pegado a un $ (antes o después, con espacio opcional)
    var mDolar = linea.match(/\$\s*(\d[\d\.]{2,})/) || linea.match(/(\d[\d\.]{2,})\s*\$/);
    if(mDolar){
      precio=parseInt(mDolar[1].replace(/\./g,''),10);
      // en celulares "-$185" es USD; en electro "$195000" es pesos. Distingo por tamaño:
      esUsd = precio < 3000;  // menos de 3000 con $ = dólar (ningún electro cuesta $185 pesos)
      nombre=limpiarNombre(linea.replace(mDolar[0],''));
      if(nombre.length>=3) pushProd(nombre, precio, esUsd, /oferta/i.test(linea), false, cot);
      return;
    }

    // ===== sin $ ni usd: no hay precio confiable, salteo (es título o medida suelta) =====
  });
  marcarSospechosos();
  renderMasivoPreview();
}
/* helpers del parser */
function limpiarNombre(s){
  return (s||'').replace(/oferta\s*!*/i,'').replace(/nacional/i,'').replace(/racing edition/i,'')
    .replace(/precio\s*costo/i,'').replace(/colores?\s+disponibles?.*/i,'')
    .replace(/🇦🇷|📱|〽️|🔱|❗|💣|🌜|✅|💰|❄️|🍳|📺|🧺|☕|!/g,'')
    .replace(/\(\s*\)/g,'')          // paréntesis vacíos ()
    .replace(/\s{2,}/g,' ').replace(/[-–,]\s*$/,'').replace(/\s+$/,'').trim();
}
function pushProd(nombre, precio, esUsd, oferta, dudoso, cot){
  var costo = esUsd ? Math.round(precio*cot) : precio;
  var venta = markupDeCosto(costo);
  _masivoParsed.push({ nombre:nombre, costo:costo, venta:venta, esUsd:esUsd, usd:esUsd?precio:null, oferta:oferta, sospechoso:dudoso });
}
function marcarSospechosos(){
  // marca precios muy fuera del rango del resto (probable error de tipeo)
  if(_masivoParsed.length>3){
    var ventas=_masivoParsed.map(function(p){return p.venta;}).sort(function(a,b){return a-b;});
    var mediana=ventas[Math.floor(ventas.length/2)];
    _masivoParsed.forEach(function(p){ if(p.venta > mediana*5) p.sospechoso=true; });
  }
}
function renderMasivoPreview(){
  var cont=document.getElementById('masivoPreview');
  if(!_masivoParsed.length){ cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:16px;font-size:.8rem">Pegá una lista y te muestro los productos detectados.</div>'; return; }
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-weight:900;color:var(--az);font-size:.9rem">✅ '+_masivoParsed.length+' productos detectados</span></div>';
  _masivoParsed.forEach(function(p,i){
    html+='<div style="background:#fff;border:1px solid '+(p.sospechoso?'#EF4444':'var(--line)')+';border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:8px">'
      +'<div style="flex:1;min-width:0"><div style="font-size:.76rem;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.nombre+(p.oferta?' 🔥':'')+'</div>'
      +'<div style="font-size:.64rem;color:var(--sub)">'+(p.esUsd?'U$'+p.usd+' → ':'')+'Vende: <b style="color:var(--az)">'+fmt(p.venta)+'</b> · 6c '+fmt(valorCuota(p.venta,6))+'</div>'
      +(p.sospechoso?'<div style="font-size:.6rem;color:#EF4444;font-weight:700">⚠️ Precio raro, revisá</div>':'')+'</div>'
      +'<button onclick="quitarMasivo('+i+')" style="background:none;border:none;color:#EF4444;font-size:1rem;cursor:pointer;padding:4px">✕</button></div>';
  });
  html+='<button onclick="guardarMasivo()" style="width:100%;background:var(--nar);color:#fff;border:none;border-radius:12px;padding:14px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:8px">💾 Cargar los '+_masivoParsed.length+' productos</button>';
  cont.innerHTML=html;
}
function quitarMasivo(i){ _masivoParsed.splice(i,1); renderMasivoPreview(); }
function guardarMasivo(){
  if(!_masivoParsed.length){ alert('No hay productos para cargar.'); return; }
  var reemplazar = document.getElementById('masivoReemplazar') && document.getElementById('masivoReemplazar').checked;
  var msg = reemplazar
    ? '⚠️ Vas a REEMPLAZAR todo el catálogo por estos '+_masivoParsed.length+' productos. Los de antes se borran. ¿Seguro?'
    : '¿Agregar '+_masivoParsed.length+' productos a tu tienda?';
  if(!confirm(msg)) return;
  if(reemplazar) PRODUCTOS=[];
  _masivoParsed.forEach(function(p){
    var prod={ id:'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), nombre:p.nombre, venta:p.venta, foto:'', categoria:'', visible:true, fechaPrecio:Date.now() };
    if(p.oferta) prod.precioAntes=Math.round(p.venta*1.15/500)*500;
    PRODUCTOS.push(prod);
  });
  guardarCatalogo();
  alert('✅ '+_masivoParsed.length+' productos '+(reemplazar?'cargados (catálogo reemplazado)':'agregados')+'.');
  _masivoParsed=[];
  render();
  abrirPanelDueno();
}

/* ===== Cuotas reales de Max: 15/55/78, redondeo $1.000 ===== */
var PLANES = { 2:{on:true,pct:15}, 4:{on:true,pct:55}, 6:{on:true,pct:78} };
function valorCuota(venta,n){ return Math.round(venta*(1+PLANES[n].pct/100)/n/1000)*1000; }
function fmt(n){ return '$'+Math.round(n).toLocaleString('es-AR'); }
function cuotasActivas(){
  if(CONFIG && CONFIG.modoVenta==='contado') return [];   // sin cuotas: solo contado
  return Object.keys(PLANES).map(Number).filter(function(n){ return PLANES[n] && PLANES[n].on; }).sort(function(a,b){return a-b;});
}
function mejorCuota(venta){ var a=cuotasActivas(); if(!a.length)return null; var n=a[a.length-1]; return {n:n, valor:valorCuota(venta,n)}; }

/* ===== Categorías reales (mismas que tu tienda) ===== */
var CATS = [
  {k:'',              ico:'🔥', txt:'Todos'},
  {k:'📱 Celulares',   ico:'📱', txt:'Celulares'},
  {k:'📺 TV',          ico:'📺', txt:'TV'},
  {k:'❄️ Heladeras',   ico:'❄️', txt:'Heladeras'},
  {k:'🍳 Cocina',      ico:'🍳', txt:'Cocina'},
  {k:'🌀 Climatización',ico:'🌀', txt:'Clima'},
  {k:'🧺 Lavado',      ico:'🧺', txt:'Lavado'},
  {k:'☕ Electro hogar',ico:'☕', txt:'Electro'},
  {k:'📦 Otros',       ico:'📦', txt:'Otros'}
];
function categoriaDe(nombre){
  var n=(nombre||'').toLowerCase();
  if(/samsung|motorola|xiaomi|iphone|celular|smartphone/.test(n))return '📱 Celulares';
  if(/heladera|freezer|frio/.test(n))return '❄️ Heladeras';
  if(/cocina|anafe|horno|microonda/.test(n))return '🍳 Cocina';
  if(/tv|televis|smart tv|tcl|led/.test(n))return '📺 TV';
  if(/ventilador|turbo|aire|calefact|estufa|caloventor/.test(n))return '🌀 Climatización';
  if(/lavarrop|secarrop|lavavaj/.test(n))return '🧺 Lavado';
  if(/termo|pava|cafeter|licuad|batidor|freidora|yogurt|tostad|sandwich/.test(n))return '☕ Electro hogar';
  return '📦 Otros';
}
function catProd(p){ return p.categoria || categoriaDe(p.nombre); }
function marcaDe(nombre){
  var n=(nombre||'').toLowerCase();
  if(/samsung|galaxy/.test(n))return 'Samsung';
  if(/motorola|moto|edge/.test(n))return 'Motorola';
  if(/xiaomi|redmi|poco/.test(n))return 'Xiaomi';
  if(/iphone|apple/.test(n))return 'Apple';
  return '';
}
/* búsqueda tolerante a acentos */
function normTxt(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,''); }

/* ===== Estado ===== */
var PRODUCTOS = [];
var catActiva = '';
var sb = null;

/* ===== Conexión Supabase ===== */
function conectar(){
  if(!SB_KEY){ cargarConfig(); mostrarSetup(); return; }
  try{
    sb = window.supabase.createClient(SB_URL, SB_KEY);
    cargarConfig();
    bajarCatalogo();
  }catch(e){ mostrarError('No pude conectar. Revisá que la key esté bien pegada.'); }
}
function bajarCatalogo(){
  // 1) intenta mostrar lo que haya en el teléfono al toque (rápido)
  try{ var local=JSON.parse(localStorage.getItem(lsKey('ae_tienda_catalogo'))||'[]'); if(local.length){ PRODUCTOS=local; render(); } }catch(e){}
  // 2) baja lo último de la nube
  sb.from('tienda_catalogo').select('datos').eq('id',keyCatalogo()).maybeSingle()
    .then(function(r){
      if(r && r.data && r.data.datos){
        PRODUCTOS = r.data.datos.filter(function(p){ return p.visible!==false; });
        try{ localStorage.setItem(lsKey('ae_tienda_catalogo'), JSON.stringify(r.data.datos)); }catch(e){}
        actualizarFavCount(); actualizarBadgeCarrito(); actualizarBeeFab();
        setTimeout(function(){ try{ mostrarBienvenida(); }catch(e){} }, 1200);
        try{ cargarPedidos(function(){ _mapaJuntos=null; }); }catch(e){}
        render();
      } else if(!PRODUCTOS.length){
        mostrarError('La nube respondió pero no hay productos cargados todavía.');
      }
    })
    .catch(function(){ if(!PRODUCTOS.length) mostrarError('No pude bajar el catálogo. Revisá la key o tu conexión.'); });
}

/* ===== Render ===== */
function render(){
  // categorías (solo las que tienen productos, + Todos)
  var catsConProd = {};
  PRODUCTOS.forEach(function(p){ catsConProd[catProd(p)]=true; });
  document.getElementById('cats').innerHTML = CATS.filter(function(c){ return c.k==='' || catsConProd[c.k]; }).map(function(c){
    return '<div class="cat'+(catActiva===c.k?' on':'')+'" onclick="setCat(\''+c.k.replace(/'/g,"\\'")+'\')">'
      +'<div class="ico">'+c.ico+'</div><span>'+c.txt+'</span></div>';
  }).join('');

  var q=normTxt(document.getElementById('buscador').value);
  var soloOfertas = window._soloOfertas || false;
  var tope = parseFloat(document.getElementById('tope') ? document.getElementById('tope').value : '') || 0;
  var orden = document.getElementById('orden') ? document.getElementById('orden').value : '';

  function enOferta(p){ return p.precioAntes && parseFloat(p.precioAntes)>parseFloat(p.venta); }
  function cuotaRef(p){ var mc=mejorCuota(p.venta); return mc?mc.valor:p.venta; }

  var lista=PRODUCTOS.filter(function(p){
    var okCat=!catActiva || catProd(p)===catActiva;
    var okQ=!q || normTxt(p.nombre).indexOf(q)>=0;
    var okOferta=!soloOfertas || enOferta(p);
    var okTope=!tope || cuotaRef(p)<=tope;
    var okFav=!viendoFavs || esFav(p);
    // los OCULTOS: el admin los ve (en gris), el cliente NO
    var okVisible = (rolActual()==='admin') ? true : (p.visible!==false);
    return okCat && okQ && okOferta && okTope && okFav && okVisible;
  });

  // ordenar
  if(orden==='barato') lista.sort(function(a,b){ return cuotaRef(a)-cuotaRef(b); });
  else if(orden==='caro') lista.sort(function(a,b){ return cuotaRef(b)-cuotaRef(a); });
  else if(orden==='oferta') lista.sort(function(a,b){ return (enOferta(b)?1:0)-(enOferta(a)?1:0); });

  // mostrar barra de filtros una vez que hay productos
  document.getElementById('filtros').style.display = PRODUCTOS.length ? 'flex' : 'none';

  // Producto del día + Destacados: solo en la portada (sin buscar, sin filtrar, sin favoritos)
  var portada = !q && !catActiva && !soloOfertas && !tope && !orden && !viendoFavs;
  renderSaludo(portada);
  renderDestacados(portada);

  document.getElementById('section-h').textContent = viendoFavs ? '❤️ Mis favoritos ('+lista.length+')' : (q ? 'Resultados' : (catActiva||'Catálogo completo')+' ('+lista.length+')');

  var wrap=document.getElementById('grid-wrap');
  if(!lista.length){
    if(viendoFavs){
      wrap.innerHTML='<div class="estado"><div class="e-i">❤️</div>Todavía no marcaste favoritos.<br>Tocá el corazón en los productos que te gusten y los guardás acá.</div>';
    } else {
      wrap.innerHTML='<div class="estado"><div class="e-i">🐝</div>'+(q?'No encontramos eso. Probá otra palabra.':'No hay productos en esta categoría.')+'</div>';
    }
    return;
  }
  wrap.innerHTML='<div class="grid">'+lista.map(function(p){
    var idx=PRODUCTOS.indexOf(p);
    var mc=mejorCuota(p.venta);
    var rolT=rolActual();
    var phStyle = p.foto ? 'style="background-image:url(\''+p.foto+'\')"' : '';
    var phIco = p.foto ? '' : catProd(p).split(' ')[0];
    var enOferta = p.precioAntes && parseFloat(p.precioAntes)>parseFloat(p.venta);
    var pctOff = enOferta ? Math.round((1-p.venta/parseFloat(p.precioAntes))*100) : 0;
    // botones según QUIÉN mira: admin/revendedor comparten · el cliente COMPRA
    var botones;
    if(rolT==='admin'){
      // ADMIN: acciones directo en la tarjeta (sin tener que abrir el producto)
      botones='<button onclick="compartir('+idx+')" style="width:100%;background:#25D366;color:#fff;border:none;border-radius:9px;padding:9px;font-size:.72rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:5px">📤 Compartir</button>'
        +'<div style="display:flex;gap:5px;margin-bottom:5px">'
          +'<button onclick="editarProducto('+idx+')" style="flex:1;background:#F5F8FF;border:1.5px solid var(--line);color:var(--az);border-radius:8px;padding:8px 4px;font-size:.66rem;font-weight:800;cursor:pointer;font-family:inherit">✏️ Editar</button>'
          +'<button onclick="cambiarFotoProducto('+idx+')" style="flex:1;background:#F5F8FF;border:1.5px solid var(--line);color:var(--az);border-radius:8px;padding:8px 4px;font-size:.66rem;font-weight:800;cursor:pointer;font-family:inherit">🖼️ Foto</button>'
          +'<button onclick="borrarProducto('+idx+')" style="background:#FEF2F2;border:1.5px solid #FECACA;color:#DC2626;border-radius:8px;padding:8px 9px;font-size:.66rem;cursor:pointer;font-family:inherit">🗑️</button>'
        +'</div>'
        +'<button onclick="abrirOpcionesRapidas('+idx+')" style="width:100%;background:#fff;border:1.5px solid var(--nar);color:var(--nar);border-radius:8px;padding:8px;font-size:.68rem;font-weight:800;cursor:pointer;font-family:inherit">⚙️ Opciones del producto</button>';
    }
    else if(rolT==='revendedor'){
      botones='<button class="share" onclick="compartir('+idx+')">📤 Compartir</button>';
    }
    else {
      botones='<button onclick="verDetalle('+idx+')" style="width:100%;background:var(--az);color:#fff;border:none;border-radius:9px;padding:9px;font-size:.71rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:5px">📅 Ver cuotas</button>'
        +'<button onclick="comprarProducto('+idx+',event)" style="width:100%;background:var(--nar);color:#fff;border:none;border-radius:9px;padding:9px;font-size:.71rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:5px">🛒 Comprar</button>'
        +'<button onclick="consultarProducto('+idx+',event)" style="width:100%;background:#25D366;color:#fff;border:none;border-radius:9px;padding:9px;font-size:.71rem;font-weight:800;cursor:pointer;font-family:inherit">💬 Consultar</button>';
    }
    var oculto = p.visible===false;
    var esAdmin = rolT==='admin';
    // fecha del precio con colores (solo la ve el admin)
    var fechaHtml='';
    if(esAdmin){
      if(p.fechaPrecio){
        var dias=Math.floor((Date.now()-p.fechaPrecio)/86400000);
        var col, bg, ico;
        if(dias>=30){ col='#DC2626'; bg='#FEF2F2'; ico='🔴'; }
        else if(dias>=7){ col='#EA580C'; bg='#FFF7ED'; ico='🟠'; }
        else { col='#059669'; bg='#F0FDF4'; ico='🟢'; }
        fechaHtml='<div style="background:'+bg+';border-radius:6px;padding:4px 7px;font-size:.58rem;color:'+col+';font-weight:800;text-align:center;margin-bottom:5px">'+ico+' Precio de hace '+dias+'d</div>';
      } else {
        fechaHtml='<div style="background:#F7F8FA;border-radius:6px;padding:4px 7px;font-size:.58rem;color:var(--sub);text-align:center;margin-bottom:5px">🕐 Sin fecha</div>';
      }
    }
    return '<div class="card" style="'+(oculto?'opacity:.45':'')+'">'
      +'<div class="ph" '+phStyle+' onclick="verDetalle('+idx+')">'+phIco
        +(enOferta ? '<span class="badge">🔥 '+pctOff+'% OFF</span>' : '')
        +(p.sinStock ? '<span style="position:absolute;top:6px;left:6px;background:#DC2626;color:#fff;font-size:.52rem;font-weight:800;padding:3px 7px;border-radius:6px">SIN STOCK</span>' : '')
        +(oculto ? '<span style="position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.65);color:#fff;font-size:.52rem;font-weight:800;padding:3px 7px;border-radius:6px">🙈 OCULTO</span>' : '')
        +(p.foto ? '<button onclick="verFotoGrande('+idx+',event)" style="position:absolute;bottom:6px;right:6px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);border:none;font-size:.85rem;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);line-height:1;padding:0">🔍</button>' : '')
        +'<button class="fav" onclick="toggleFav('+idx+',event)">'+(esFav(p)?'❤️':'🤍')+'</button>'
      +'</div>'
      +'<div class="body">'
        +fechaHtml
        +'<div class="nom" onclick="verDetalle('+idx+')">'+p.nombre+'</div>'
        +(p.ultimas?'<div style="font-size:.6rem;color:#DC2626;font-weight:800;margin-bottom:3px">📦 ¡Últimas unidades!</div>':'')
        +(p.sinInteres?'<div style="font-size:.6rem;color:var(--gr);font-weight:800;margin-bottom:3px">💳 Cuotas SIN INTERÉS</div>':'')
        +precioTarjeta(p)
        +botones
      +'</div></div>';
  }).join('')+'</div>'+pieAmarango();
}
function setCat(k){ catActiva=(catActiva===k?'':k); render(); }

/* ===== FAVORITOS (guardados en el teléfono del cliente) ===== */
function idProd(p){ return p.id!=null ? String(p.id) : (p.nombre||''); }
function cargarFavs(){ try{ return JSON.parse(localStorage.getItem('ae_favoritos')||'[]'); }catch(e){ return []; } }
function guardarFavs(a){ try{ localStorage.setItem('ae_favoritos', JSON.stringify(a)); }catch(e){} }
function esFav(p){ return cargarFavs().indexOf(idProd(p))>=0; }
function toggleFav(idx, ev){
  if(ev){ ev.stopPropagation(); }
  var p=PRODUCTOS[idx]; if(!p)return;
  var favs=cargarFavs(); var id=idProd(p); var i=favs.indexOf(id);
  if(i>=0) favs.splice(i,1); else favs.push(id);
  guardarFavs(favs);
  actualizarFavCount();
  render();
}
function actualizarFavCount(){
  var c=document.getElementById('favCount'); if(c) c.textContent=cargarFavs().length;
}
var viendoFavs=false;
function verFavoritos(){
  viendoFavs=!viendoFavs;
  var b=document.getElementById('favBtn');
  if(b) b.style.background = viendoFavs ? 'var(--nar)' : 'rgba(255,255,255,.15)';
  render();
}

/* Saludo según la hora del día */

  var wrap=document.getElementById('saludo-wrap');

  if(h>=6 && h<13){ emo='🌅'; hola='¡Buenos días!'; sub='Arrancá el día equipando tu casa en cuotas fijas'; }

  else { emo='🌙'; hola='¡Buenas noches!'; sub='Tranqui, elegí lo tuyo y te lo llevás en cuotas'; }

    +'<div class="txt"><div class="hola">'+hola+'</div><div class="sub">'+sub+'</div></div></div>'

      +'<span style="font-size:1.6rem">🧮</span>'

function renderDestacados(mostrar){
  var wrap=document.getElementById('destacados-wrap');
  if(!mostrar){ wrap.innerHTML=''; return; }
  var html='';

  // Producto del día
  var pdd=PRODUCTOS.find(function(p){ return p.delDia; });
  if(pdd){
    var idx=PRODUCTOS.indexOf(pdd);
    var mc=mejorCuota(pdd.venta);
    var foto = pdd.foto ? 'style="background-image:url(\''+pdd.foto+'\')"' : '';
    var ico = pdd.foto ? '' : catProd(pdd).split(' ')[0];
    html+='<div class="pdd" onclick="verDetalle('+idx+')">'
      +'<span class="tag">🌟 PRODUCTO DEL DÍA</span>'
      +'<div class="foto" '+foto+'>'+ico+'</div>'
      +'<div class="info"><div class="n">'+pdd.nombre+'</div>'
      +(mc?'<div class="cv">'+fmt(mc.valor)+'</div><div class="cn">en '+mc.n+' cuotas fijas</div>':'')
      +'<div class="ct">Contado: '+fmt(pdd.venta)+'</div></div></div>';
  }

  // Destacados (excluyo el del día para no repetir)
  var dest=PRODUCTOS.filter(function(p){ return p.destacado && !p.delDia; });
  if(dest.length){
    html+='<div class="section-h" style="padding-top:12px">⭐ Destacados de la semana</div>';
    html+='<div class="dest-row">'+dest.map(function(p){
      var idx=PRODUCTOS.indexOf(p);

      return '<div class="dest-card" onclick="verDetalle('+idx+')">'

        +(mc?'<div class="dcv">'+fmt(mc.valor)+'</div><div class="dcn">'+mc.n+' cuotas fijas</div>':'')
        +'</div></div>';
    }).join('')+'</div>';
  }

  wrap.innerHTML=html;
}

function calcSimulador(){
  var s=document.getElementById('simSlider'); if(!s)return;
  var tope=parseInt(s.value,10);
  document.getElementById('simValor').textContent=fmt(tope);

  // busca qué se puede llevar con ese pago mensual
  var opciones=[];
  PRODUCTOS.forEach(function(p,idx){
    if(p.visible===false || p.sinStock) return;
    // ¿en qué plan de cuotas le entra?
    var planes=cuotasActivas();
    for(var i=planes.length-1; i>=0; i--){   // empieza por el de más cuotas (la más baja)
      var n=planes[i];
      var vc=valorCuota(p.venta, n);
      if(vc<=tope){
        opciones.push({ p:p, idx:idx, n:n, cuota:vc });
        break;   // se queda con el plan más conveniente que le entra
      }
    }
  });

  var cont=document.getElementById('simResultado');
  if(!opciones.length){
    cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:30px 20px;font-size:.86rem">'
      +'<div style="font-size:2.4rem;margin-bottom:8px">🤔</div>'
      +'Con ese monto todavía no llegamos.<br><span style="font-size:.78rem">Subí un poco el deslizador y probá. 🐝</span></div>';
    return;
  }

  // ordena: primero lo más caro que se pueda llevar (le muestra lo mejor)
  opciones.sort(function(a,b){ return b.p.venta - a.p.venta; });
  var muestra=opciones.slice(0,10);

  var html='<div style="background:#F0FDF4;border:1.5px solid #A7F3D0;border-radius:12px;padding:12px;margin-bottom:14px;text-align:center">'
    +'<div style="font-size:.92rem;font-weight:900;color:#059669">🎉 ¡Te podés llevar '+opciones.length+' producto'+(opciones.length===1?'':'s')+'!</div>'
    +'<div style="font-size:.74rem;color:#059669;margin-top:2px">Pagando '+fmt(tope)+' por mes</div>'
    +'</div>';

  muestra.forEach(function(o){
    html+='<div onclick="cerrarConsulta();verDetalle('+o.idx+')" style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;gap:11px;align-items:center;cursor:pointer">'
      +'<div style="width:58px;height:58px;flex:0 0 auto;border-radius:9px;background:'+(o.p.foto?'#fff url('+o.p.foto+') center/contain no-repeat':'#F5F8FF')+';display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:1px solid var(--line)">'+(o.p.foto?'':catProd(o.p).split(' ')[0])+'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:.78rem;font-weight:700;color:var(--txt);line-height:1.25;margin-bottom:3px">'+o.p.nombre+'</div>'
        +'<div style="font-size:.95rem;font-weight:900;color:var(--nar)">'+fmt(o.cuota)+'<span style="font-size:.66rem;color:var(--sub);font-weight:600"> x '+o.n+' cuotas</span></div>'
        +'<div style="font-size:.66rem;color:var(--sub)">Contado: '+fmt(o.p.venta)+'</div>'
      +'</div>'
      +'<span style="color:var(--sub);font-size:1.1rem">›</span>'
      +'</div>';
  });

  if(opciones.length>10){
    html+='<div style="text-align:center;font-size:.76rem;color:var(--sub);padding:6px">…y '+(opciones.length-10)+' más</div>';
  }
  cont.innerHTML=html;
}

/* ═══════ 🧠 ALGORITMO DE SUGERIDOS ═══════
   Ya no adivina: APRENDE de los pedidos reales.
   1) Qué se compra JUNTO (lo más fuerte)
   2) Qué es lo más pedido en general
   3) Si no hay datos, cae a categoría + precio parecido */

/* Construye el mapa de "qué se lleva con qué" a partir de los pedidos */
var _mapaJuntos=null;
function construirMapaJuntos(){
  _mapaJuntos={};
  (PEDIDOS||[]).forEach(function(ped){
    if(!ped.items || ped.items.length<2) return;   // solo sirven los pedidos con 2+ productos
    var nombres=ped.items.map(function(it){ return it.nombre; });
    // por cada par de productos del mismo pedido, suma un punto
    nombres.forEach(function(a){
      nombres.forEach(function(b){
        if(a===b) return;
        if(!_mapaJuntos[a]) _mapaJuntos[a]={};
        _mapaJuntos[a][b]=(_mapaJuntos[a][b]||0)+1;
      });
    });
  });
  return _mapaJuntos;
}
/* Cuántas veces se pidió cada producto (popularidad) */
function popularidad(){
  var pop={};
  (PEDIDOS||[]).forEach(function(ped){
    (ped.items||[]).forEach(function(it){
      pop[it.nombre]=(pop[it.nombre]||0)+(it.cant||1);
    });
  });
  return pop;
}

function renderSugeridos(idx){
  var cont=document.getElementById('d-sugeridos'); if(!cont)return;
  var p=PRODUCTOS[idx]; if(!p){ cont.innerHTML=''; return; }

  var candidatos=[];
  var motivo='';

  // ── 1) LO QUE SE COMPRA JUNTO (aprendido de los pedidos reales)
  if(!_mapaJuntos) construirMapaJuntos();
  var juntos=_mapaJuntos[p.nombre];
  if(juntos){
    var conJuntos=Object.keys(juntos).map(function(nom){
      var prod=PRODUCTOS.find(function(x){ return x.nombre===nom && x.visible!==false && !x.sinStock; });
      return prod ? {p:prod, score:juntos[nom]*100} : null;   // peso ALTO: es dato real
    }).filter(Boolean);
    if(conJuntos.length){
      candidatos=candidatos.concat(conJuntos);
      motivo='Quienes lo compraron, también se llevaron';
    }
  }

  // ── 2) LO MÁS PEDIDO (si falta completar)
  if(candidatos.length<4){
    var pop=popularidad();
    var populares=PRODUCTOS.filter(function(x,i){
      return i!==idx && x.visible!==false && !x.sinStock && pop[x.nombre] &&
             !candidatos.some(function(c){ return c.p.nombre===x.nombre; });
    }).map(function(x){ return {p:x, score:pop[x.nombre]*10}; });   // peso medio
    candidatos=candidatos.concat(populares);
    if(!motivo && populares.length) motivo='Lo más pedido';
  }

  // ── 3) MISMA CATEGORÍA + PRECIO PARECIDO (el respaldo de siempre)
  if(candidatos.length<4){
    var cat=catProd(p);
    var similares=PRODUCTOS.filter(function(x,i){
      return i!==idx && x.visible!==false && !x.sinStock &&
             !candidatos.some(function(c){ return c.p.nombre===x.nombre; });
    }).map(function(x){
      var s=0;
      if(catProd(x)===cat) s+=5;                                    // misma categoría
      var dif=Math.abs(x.venta-p.venta)/Math.max(p.venta,1);
      s += Math.max(0, 4-dif*4);                                     // precio parecido
      if(x.destacado) s+=1;
      if(x.precioAntes && x.precioAntes>x.venta) s+=1;               // en oferta
      return {p:x, score:s};
    });
    candidatos=candidatos.concat(similares);
    if(!motivo) motivo='También te puede interesar';
  }

  // ordena por puntaje y saca los mejores
  candidatos.sort(function(a,b){ return b.score-a.score; });
  var top=[];
  var vistos={};
  candidatos.forEach(function(c){
    if(top.length>=8) return;
    if(vistos[c.p.nombre]) return;
    vistos[c.p.nombre]=true;
    top.push(c.p);
  });
  if(!top.length){ cont.innerHTML=''; return; }

  var html='<div style="border-top:1px solid var(--line);padding-top:16px">'
    +'<div style="font-weight:900;color:var(--az);font-size:.92rem;margin-bottom:10px">🛍️ '+motivo+'</div>'
    +'<div class="sug-row">';
  top.forEach(function(s){
    var si=PRODUCTOS.indexOf(s);
    var mc=mejorCuota(s.venta);
    html+='<div class="sug-card" onclick="verDetalle('+si+')">'
      +'<div class="sf">'+(s.foto?'<img src="'+s.foto+'">':'<span style="font-size:1.8rem;opacity:.3">'+catProd(s).split(' ')[0]+'</span>')+'</div>'
      +'<div class="sb"><div class="sn">'+s.nombre+'</div>'
      +'<div class="sp">'+fmt(s.venta)+'</div>'
      +(mc?'<div class="sc">💳 '+mc.n+' cuotas de '+fmt(mc.valor)+'</div>':'')
      +'</div></div>';
  });
  html+='</div></div>';
  cont.innerHTML=html;
}

function abrirRegistro(){

  document.getElementById('ayudaBody').innerHTML=

    +'<div style="font-size:.78rem;color:var(--sub);margin-bottom:14px">Es rápido. Con esto te reconocemos y comprás más fácil. 🐝</div>'

    +campo('Localidad','rg_loc','Ej: San Miguel')
    +'<button onclick="guardarRegistro()" style="width:100%;background:var(--nar);color:#fff;border:none;border-radius:13px;padding:15px;font-size:.92rem;font-weight:900;cursor:pointer;font-family:inherit;margin-top:6px">✅ Listo, registrarme</button>'
    +'<button onclick="cerrarConsulta()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--sub);border-radius:12px;padding:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px">← Cancelar</button>';

function guardarRegistro(){
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
  var nom=g('rg_nombre'), wa=g('rg_wa').replace(/[^0-9]/g,''), loc=g('rg_loc');
  if(!nom || !wa){ alert('Poné al menos tu nombre y WhatsApp.'); return; }
  var cli={ nombre:nom, wa:wa, loc:loc, fecha:Date.now() };
  try{ localStorage.setItem('ae_cliente', JSON.stringify(cli)); }catch(e){}
  // lo suma a la lista de clientes del dueño
  cargarClientes(function(){
    var ya=CLIENTES.find(function(c){ return String(c.wa).replace(/[^0-9]/g,'')===wa; });
    if(!ya){ CLIENTES.push(cli); guardarClientes(); }
  });
  cerrarConsulta();
  toastCarrito('✅ ¡Listo, '+nom.split(' ')[0]+'! Ya estás registrado 🐝');
}

/* 🛒 COMPRAR → va a los ADMINISTRADORES (los que cobran y dan el alias) */
function comprarProducto(idx, ev){
  if(ev) ev.stopPropagation();
  var p=PRODUCTOS[idx]; if(!p)return;
  var lines=cuotasActivas().map(function(n){ return '💳 '+n+' cuotas fijas de '+fmt(valorCuota(p.venta,n)); });
  var msg='Hola! Quiero *COMPRAR* este producto 🛒\n\n*'+p.nombre+'*\n\n'+lines.join('\n')+'\n\n➡️ Contado: '+fmt(p.venta)+'\n\n¿Me pasás los datos para pagar? 🐝';
  var admins=(CONFIG.admins&&CONFIG.admins.length)?CONFIG.admins:[];
  // guarda el pedido en el historial
  window._pedidoPendiente={ items:[{nombre:p.nombre, venta:p.venta, cant:1}], total:p.venta };
  elegirContacto(admins, msg, '🛒 Comprar', p.nombre+' · '+fmt(p.venta), 'Elegí con quién coordinar el pago');
}
/* 💬 CONSULTAR → va a los VENDEDORES (los que atienden dudas) */
function consultarProducto(idx, ev){
  if(ev) ev.stopPropagation();
  var p=PRODUCTOS[idx]; if(!p)return;
  var msg='Hola! Me interesa el *'+p.nombre+'* ('+fmt(p.venta)+' contado). ¿Me pasás info de las cuotas? 🐝';
  var vends=(CONFIG.vendedores&&CONFIG.vendedores.length)?CONFIG.vendedores:[];
  elegirContacto(vends, msg, '💬 Consultá este producto', p.nombre+' · '+fmt(p.venta), 'Consultá con nosotros');

/* Ventana común para elegir a quién escribirle */
function elegirContacto(lista, msg, titulo, subtitulo, etiqueta){
  // si no hay nadie cargado, usa el WhatsApp del negocio
  if(!lista.length){
    var wa=(CONFIG.whatsapp||'').replace(/[^0-9]/g,'');
    var url = wa ? 'https://wa.me/'+wa+'?text='+encodeURIComponent(msg) : 'https://wa.me/?text='+encodeURIComponent(msg);
    registrarPedidoPendiente('');
    window.open(url,'_blank');
    return;
  }
  var html='<div style="font-weight:900;color:var(--az);font-size:1rem;margin-bottom:3px">'+titulo+'</div>'
    +'<div style="font-size:.8rem;color:var(--sub);margin-bottom:14px">'+subtitulo+'</div>'
    +'<div style="font-size:.66rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">'+etiqueta+'</div>';
  lista.forEach(function(v){
    html+='<button onclick="registrarPedidoPendiente(\''+v.nombre.replace(/'/g,"\\'")+'\');window.open(\'https://wa.me/'+String(v.wa).replace(/[^0-9]/g,'')+'?text='+encodeURIComponent(msg)+'\',\'_blank\');cerrarConsulta()" style="width:100%;background:#25D366;color:#fff;border:none;border-radius:12px;padding:14px;font-size:.9rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:8px">💬 '+v.nombre+'</button>';
  });
  html+='<button onclick="cerrarConsulta()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--sub);border-radius:11px;padding:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px">Cancelar</button>';
  document.getElementById('ayudaBody').innerHTML=html;
  document.getElementById('ayudaOverlay').classList.add('on'); empujarPantalla('ayuda', cerrarConsulta);
}
/* registra el pedido en el historial (si hay uno pendiente) */
function registrarPedidoPendiente(atendio){
  var pp=window._pedidoPendiente;
  if(!pp) return;
  cargarPedidos(function(){
    guardarPedido(pp.items, pp.total, atendio);
  });
  window._pedidoPendiente=null;
}
function cerrarConsulta(){ document.getElementById('ayudaOverlay').classList.remove('on'); }

/* ADMIN: VENDER — arma el mensaje completo y lo manda al cliente */
function venderProducto(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var tel=prompt('📱 WhatsApp del cliente (sin +, ej: 5491122334455):');
  if(tel===null) return;
  tel=(tel||'').replace(/[^0-9]/g,'');
  var lines=cuotasActivas().map(function(n){ return '💳 '+n+' cuotas fijas de '+fmt(valorCuota(p.venta,n)); });
  var msg='*'+p.nombre.toUpperCase()+'*\n\n'+lines.join('\n')+'\n\n➡️ Contado: '+fmt(p.venta)
    +'\n\n⭐ Retirás pagando solo la 1ra cuota ese mismo día.\n'+firmaTienda()+' 🐝';
  // con foto si tiene y el celu lo permite
  if(p.foto && navigator.share && !tel){
    fetch(p.foto).then(function(r){return r.blob();}).then(function(b){
      var f=new File([b],'producto.jpg',{type:b.type||'image/jpeg'});
      if(navigator.canShare && navigator.canShare({files:[f]})) return navigator.share({files:[f],text:msg});
      return navigator.share({text:msg});
    }).catch(function(){ window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'); });
    return;
  }
  var url = tel ? 'https://wa.me/'+tel+'?text='+encodeURIComponent(msg) : 'https://wa.me/?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}
/* ADMIN: cambiar/poner la foto de un producto */
function cambiarFotoProducto(idx){
  var inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=function(ev){
    var file=ev.target.files&&ev.target.files[0]; if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var max=900,w=img.width,h=img.height;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        var data=cv.toDataURL('image/jpeg',0.88);
        // sube a la nube (así no se pierde ni llena el espacio)
        toastCarrito('📸 Guardando foto…');
        comprimirFoto(data, function(chica){
          PRODUCTOS[idx].foto=chica;
          guardarCatalogo();
          render();
          verDetalle(idx);
          toastCarrito('✅ Foto guardada');
        });
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

/* ADMIN: editar producto completo (nombre, costo↔venta, categoría, características) */

  document.getElementById('adminBody').innerHTML=
     '<div style="font-weight:900;color:var(--az);font-size:1.05rem;margin-bottom:14px">✏️ Editar producto</div>'
    +campo('Nombre','ed_nombre',p.nombre,'Nombre del producto')
    // costo ↔ venta con conversión
    +'<div style="font-size:.66rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Costo ($)</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px">'
      +'<input type="number" id="ed_costo" value="'+(p.costo||'')+'" placeholder="Costo" style="flex:1;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-family:inherit;font-size:.88rem;outline:none">'
      +'<button onclick="convCostoVenta()" style="background:var(--az);color:#fff;border:none;border-radius:11px;padding:12px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:.78rem;white-space:nowrap">Costo → Venta</button>'
    +'</div>'
    +'<div style="font-size:.66rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Precio de venta ($)</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px">'
      +'<input type="number" id="ed_venta" value="'+p.venta+'" style="flex:1;border:2px solid var(--nar);border-radius:11px;padding:12px;font-family:inherit;font-size:1rem;font-weight:900;color:var(--nar);outline:none">'
      +'<button onclick="convVentaCosto()" style="background:#F5F8FF;color:var(--az);border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:.78rem;white-space:nowrap">Venta → Costo</button>'
    +'</div>'
    // categoría
    +'<div style="font-size:.66rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Categoría</div>'
    +'<select id="ed_categoria" style="width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-family:inherit;font-size:.88rem;outline:none;margin-bottom:12px;background:#fff">'
      +cats.map(function(c){ return '<option value="'+c+'"'+(c===catActual?' selected':'')+'>'+c+'</option>'; }).join('')
    +'</select>'
    // características
    +'<div style="font-size:.66rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Características (pegá acá)</div>'
    +'<textarea id="ed_desc" placeholder="Pegá las características del producto..." style="width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-family:inherit;font-size:.86rem;min-height:100px;outline:none;resize:vertical;margin-bottom:14px">'+(p.desc||'')+'</textarea>'
    +'<button onclick="guardarEdicion('+idx+')" style="width:100%;background:#10B981;color:#fff;border:none;border-radius:13px;padding:15px;font-size:.95rem;font-weight:900;cursor:pointer;font-family:inherit">✅ Guardar</button>'
    +'<button onclick="cerrarAdmin();verDetalle('+idx+')" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--sub);border-radius:12px;padding:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px">Cancelar</button>';
  document.getElementById('adminOverlay').classList.add('on'); empujarPantalla('admin', cerrarAdmin);

function convCostoVenta(){
  var c=parseFloat(document.getElementById('ed_costo').value)||0;
  if(!c){ alert('Poné el costo primero.'); return; }
  document.getElementById('ed_venta').value=markupDeCosto(c);
}
function convVentaCosto(){
  var v=parseFloat(document.getElementById('ed_venta').value)||0;
  if(!v){ alert('Poné la venta primero.'); return; }
  // busca qué costo, con el markup, daría esa venta
  var mk=CONFIG.markup||CONFIG_DEFAULT.markup;
  for(var i=0;i<mk.length;i++){
    var estimado=Math.round(v/(1+mk[i].pct/100));
    if(estimado<=mk[i].hasta){ document.getElementById('ed_costo').value=estimado; return; }
  }
  document.getElementById('ed_costo').value=Math.round(v/1.3);
}
function guardarEdicion(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
  var nom=g('ed_nombre'); if(!nom){ alert('Poné el nombre.'); return; }
  var venta=parseFloat(g('ed_venta'))||p.venta;
  var costo=parseFloat(g('ed_costo'))||null;
  var cambióPrecio = venta!==p.venta;
  p.nombre=nom;
  p.venta=venta;
  if(costo) p.costo=costo;
  p.categoria=g('ed_categoria');
  p.desc=g('ed_desc');
  if(cambióPrecio) p.fechaPrecio=Date.now();   // precio nuevo = fecha nueva
  guardarCatalogo();
  render();
  cerrarAdmin();
  verDetalle(idx);
  alert('✅ Guardado. Ya se ve en la tienda.');
}
function borrarProducto(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  if(!confirm('¿Borrar "'+p.nombre+'" de la tienda?')) return;
  PRODUCTOS.splice(idx,1);
  guardarCatalogo();
  cerrar();
  render();
  alert('🗑️ Producto borrado de la tienda.');
}
function cerrar(){ document.getElementById('overlay').classList.remove('on'); }

/* ===== Compartir con foto (misma lógica que tu tienda) ===== */
function armarMensaje(p){
  var lines=cuotasActivas().map(function(n){ return '💳 '+n+' cuotas fijas de '+fmt(valorCuota(p.venta,n)); });
  return '*'+(p.nombre||'PRODUCTO').toUpperCase()+'*\n\n'+lines.join('\n')+'\n\n➡️ Contado: '+fmt(p.venta)+'\n@AmarangoElectro 🐝';
}
function compartir(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var msg=armarMensaje(p);
  if(p.foto && navigator.share){
    fetch(p.foto).then(function(r){return r.blob();}).then(function(blob){
      var file=new File([blob],'producto.jpg',{type:blob.type||'image/jpeg'});
      if(navigator.canShare && navigator.canShare({files:[file]})){ return navigator.share({files:[file], text:msg}); }
      return navigator.share({text:msg});
    }).catch(function(){ soloTexto(msg); });
    return;
  }
  if(navigator.share){ navigator.share({title:p.nombre, text:msg}).catch(function(){soloTexto(msg);}); }
  else soloTexto(msg);
}
function compartirActual(){ if(actualIdx!=null) compartir(actualIdx); }
function soloTexto(msg){ window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'); }
